/* ============================ QR transport schema v2 ============================
   A fully-populated Wheel+Paddle session's clinical data, sent as plain JSON
   (schema v1), produces a QR too dense to reliably decode at a screen-scannable
   size — confirmed by direct testing (see BACKEND_TEST_PLAN.md). v2 fixes this
   with THREE layers, applied in order: (1) an explicit allowlist that drops
   every field that is derivable, duplicated, or never read on a receiving
   device — see the field-by-field audit in BACKEND_IMPLEMENTATION_PLAN.md;
   (2) short keys instead of full field names; (3) real deflate compression
   (vendored js/vendor/fflate.min.js) over the compact JSON, base64url-encoded
   with an `OOX2:` prefix. v1 (legacy plain-JSON) QR codes still decode
   unchanged — decodeQrPayload() detects the format and normalises both into
   the SAME shape the rest of handleScannedPayload() already validates against
   (schema/festival/duplicate/stale-version checks are NOT duplicated here). */
const QR_ENC_PREFIX = 'OOX2:';
// Fixed enumerations already used elsewhere for these fields (AGE_BANDS,
// VILLAGES, PADDLE_POWERS are declared once, above) — index-coded so the
// wire payload carries a number instead of a repeated string. An unknown
// value (e.g. a future config change) safely falls back to the raw string
// rather than corrupting or dropping data.
const GENDER_CODES=['Male','Female'];
const SESSION_TYPE_CODES=['Individual','Group'];
const CATARACT_CODES=['No','Yes, right eye','Yes, left eye','Yes, both eyes','Unsure'];
function codeIndex(list,val){ const i=list.indexOf(val); return i>=0?i:val; }
function codeValue(list,idx){ return (typeof idx==='number' && list[idx]!=null) ? list[idx] : idx; }

/* Deterministic 32-bit FNV-1a hash, hex-encoded — a short, fast, synchronous
   integrity checksum for the QR transport payload.
   This detects ACCIDENTAL corruption and incomplete/truncated QR data (a
   damaged print, a partial scan, a bit flipped in transit) — that is its
   only job, and it does that job well enough without forcing every QR
   encode/decode call in this file to become async for crypto.subtle.
   It is NOT cryptographic protection: FNV-1a has no collision resistance
   and no keying, so it cannot detect a deliberate, malicious modification
   by someone who can compute the same hash. No code in this app should ever
   treat a passing checksum as a claim of authenticity — only as "this QR
   was not accidentally damaged." If a future requirement needs to defend
   against deliberate tampering, that needs a real MAC/signature, not this. */
function fnv1aHash(str){
  let h=0x811c9dc5;
  for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,0x01000193); }
  return (h>>>0).toString(16).padStart(8,'0');
}
function canonicalStringForChecksum(compact){
  // Fixed field order, independent of object-key insertion order — computed
  // identically at encode and decode time so the checksum is unambiguous.
  return [compact.v, compact.c, compact.s||'', compact.f||'', compact.e||'', compact.n, JSON.stringify(compact.r)].join('|');
}
function b64urlEncode(bytes){
  let bin=''; for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64urlDecode(str){
  let s=str.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4) s+='=';
  const bin=atob(s), bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}

function compactEyeLine(e){ return e ? [e.lineReached, e.bonusLetters||0] : null; }
function expandEyeLine(a){ return a ? {lineReached:a[0], bonusLetters:a[1]||0, logmar:calculateLogMAR(a[0],a[1]||0)} : null; }
function compactWheelEye(e){
  if(!e || !e.lensType) return null;
  return [e.lensType, e.spherePower||null, e.addOnUsed?1:0, e.addOnPower||null,
    e.toricUsed?1:0, e.toricPower||null, (e.toricAxis!=null?e.toricAxis:null),
    e.colourTestResult||null, e.canReadLine9OrSmaller?1:0, e.visionImproved?1:0];
}
function expandWheelEye(a){
  if(!a) return null;
  const eye={ lensType:a[0], spherePower:a[1], addOnUsed:!!a[2], addOnPower:a[3],
    toricUsed:!!a[4], toricPower:a[5], toricAxis:a[6],
    colourTestResult:a[7], canReadLine9OrSmaller:!!a[8], visionImproved:!!a[9] };
  eye.bestLens=bestLensLabel(eye);
  return eye;
}

/* Builds the compact clinical-results envelope. Every excluded field was
   checked against actual DE.isXComplete()/gating reads and actual renders —
   see the audit table in BACKEND_IMPLEMENTATION_PLAN.md for the field-by-
   field justification (derivable: logmar, bestLens, paddle suggestion/
   override, paddle.ageBand; duplicated: version/status repeated inside the
   old snap; administrative/never read on a receiving device: testerId,
   deviceId, recordedAt/completedAt, path, dir, time; excluded per explicit
   instruction: free-text notes). Nothing here removes a clinical RESULT. */
function compactResultsFor(s){
  const k=s.intake||{};
  const r={
    st: s.status==='Finalised'?1:0,
    i: [codeIndex(AGE_BANDS,k.ageBand), codeIndex(GENDER_CODES,k.gender), codeIndex(VILLAGES,k.village), codeIndex(CATARACT_CODES,k.cataract), codeIndex(SESSION_TYPE_CODES,k.sessionType)],
  };
  if(s.distance) r.d=[compactEyeLine(s.distance.rightUnaided), compactEyeLine(s.distance.leftUnaided), s.distance.hasGlasses?1:0, s.distance.hasGlasses?compactEyeLine(s.distance.ownGlasses):null];
  if(s.near) r.nr=[compactEyeLine(s.near.unaided), s.near.hasReading?1:0, s.near.hasReading?compactEyeLine(s.near.ownGlasses):null];
  if(s.wheel) r.w=[s.wheel.pd, compactWheelEye(s.wheel.right), compactWheelEye(s.wheel.left)];
  if(s.paddle) r.p=[codeIndex(PADDLE_POWERS,s.paddle.clientPreference), codeIndex(PADDLE_POWERS,s.paddle.selectedPower)];
  if(s.dispense) r.x=[s.dispense.glassesDispensed?1:0, s.dispense.frameSize||null, s.dispense.frameColour||null];
  if(s.exit) r.ex=[s.exit.counsellingDone?1:0, s.exit.glassesDispensed?1:0];
  return r;
}
/* Reverses compactResultsFor — reconstructs the SAME full session shape
   every existing screen/DE function already expects, recomputing derivable
   fields exactly the way the original save functions did (never inventing
   new data). `path`/`dir`/`time` are UI-only and confirmed never read for
   any decision or gating logic — rebuilt/defaulted here for consistency
   with a normally-created session, not because anything depends on them. */
function expandResults(cid, ver, r){
  const ageBand=codeValue(AGE_BANDS,r.i[0]), gender=codeValue(GENDER_CODES,r.i[1]),
    village=codeValue(VILLAGES,r.i[2]), cataract=codeValue(CATARACT_CODES,r.i[3]),
    sessionType=codeValue(SESSION_TYPE_CODES,r.i[4]);
  const s={
    id:cid, version:ver, status: r.st?'Finalised':'In Progress', dir:'out', time:nowTime(),
    intake:{ageBand,gender,village,cataract,sessionType,notes:''},
    distance:null, near:null, wheel:null, paddle:null, dispense:null, exit:null,
  };
  if(r.d) s.distance={ rightUnaided:expandEyeLine(r.d[0]), leftUnaided:expandEyeLine(r.d[1]), hasGlasses:!!r.d[2], ownGlasses: r.d[3]?expandEyeLine(r.d[3]):null };
  if(r.nr) s.near={ unaided:expandEyeLine(r.nr[0]), hasReading:!!r.nr[1], ownGlasses: r.nr[2]?expandEyeLine(r.nr[2]):null };
  if(r.w) s.wheel={ pd:r.w[0], right:expandWheelEye(r.w[1]), left:expandWheelEye(r.w[2]) };
  if(r.p){
    const clientPreference=codeValue(PADDLE_POWERS,r.p[0])||null, selectedPower=codeValue(PADDLE_POWERS,r.p[1])||null;
    const sug=suggestPaddlePower(ageBand);
    s.paddle={ ageBand, suggestedPower:sug.power, suggestionNote:sug.note, clientPreference, selectedPower,
      preferenceOverrodeSuggestion: !!clientPreference && clientPreference!==sug.power, notes:'' };
  }
  if(r.x) s.dispense={ glassesDispensed:!!r.x[0], frameSize:r.x[1]||null, frameColour:r.x[2]||null };
  if(r.ex) s.exit={ counsellingDone:!!r.ex[0], glassesDispensed:!!r.ex[1] };
  s.path=['Registration'];
  if(s.distance) s.path.push('Distance');
  if(s.near) s.path.push('Near');
  if(s.wheel) s.path.push('Wheel');
  if(s.paddle) s.path.push('Paddle');
  if(s.dispense) s.path.push('Dispense');
  if(s.exit) s.path.push('Exit');
  return s;
}

/* Builds a v2 QR string: compact allowlisted payload → checksum → deflate →
   base64url → `OOX2:` prefix. Throws (visibly, per showHandoverQR's own
   error handling) rather than silently emitting something the decoder can't
   tell apart from a compressed payload if the compression library failed
   to load — never ship a payload under the OOX2 prefix that isn't real. */
function encodeQrPayload(s){
  console.info('[QR TRACE] encodeQrPayload() entered', { clientId:s.id, version:s.version, fflateExists:!!window.fflate });
  try{
    const ctx = window.OOXII_BACKEND ? window.OOXII_BACKEND.getCachedContext() : null;
    // sid is the real client_sessions.id (server UUID) so a later sync can
    // write to the SAME server row from either device.
    const sid = window.OOXII_SESSIONS ? window.OOXII_SESSIONS.ensureServerId(s) : ('uuid-'+s.id);
    const compact = { v:2, c:s.id, s:sid, f: ctx?ctx.activeFestivalId:null, e:s._lastEventId||null, n:s.version, r:compactResultsFor(s) };
    const checksum = fnv1aHash(canonicalStringForChecksum(compact));
    const withChecksum = Object.assign({}, compact, {k:checksum});
    const jsonString = JSON.stringify(withChecksum);
    console.info('[QR TRACE] encodeQrPayload() compact payload built', { clientId:s.id, sid, festivalId: ctx?ctx.activeFestivalId:null, payload_length: jsonString.length });
    if(!window.fflate) throw new Error('Compression library (js/vendor/fflate.min.js) is not loaded');
    const bytes = window.fflate.deflateSync(window.fflate.strToU8(jsonString));
    const encoded = QR_ENC_PREFIX + b64urlEncode(bytes);
    console.info('[QR TRACE] encodeQrPayload() compression complete', { clientId:s.id, payload_length: jsonString.length, compressed_length: bytes.length, encoded_length: encoded.length });
    return encoded;
  }catch(e){
    console.error('[QR TRACE] encodeQrPayload() threw', { clientId:s.id, message:e.message, stack:e.stack });
    throw e;
  }
}
/* Detects v2 (compressed compact) vs v1 (legacy plain JSON) and normalises
   BOTH into the same {cid,sid,fid,eid,ver,snap} shape handleScannedPayload
   already validates — schema/festival/duplicate/stale-version checks are
   NOT duplicated here. Returns {error:'checksum'|'corrupt'|'unrecognised'|
   'no_compression_lib'} on any failure; nothing is imported on an error. */
function decodeQrPayload(raw){
  if(typeof raw!=='string' || !raw) return {error:'unrecognised'};
  if(raw.startsWith(QR_ENC_PREFIX)){
    if(!window.fflate) return {error:'no_compression_lib'};
    let compact;
    try{
      const bytes=b64urlDecode(raw.slice(QR_ENC_PREFIX.length));
      compact=JSON.parse(window.fflate.strFromU8(window.fflate.inflateSync(bytes)));
    }catch(e){ return {error:'corrupt'}; }
    if(!compact || compact.v!==2 || !compact.c || !compact.k || !compact.r) return {error:'corrupt'};
    if(fnv1aHash(canonicalStringForChecksum(compact))!==compact.k) return {error:'checksum'};
    let expanded;
    try{ expanded=expandResults(compact.c, compact.n, compact.r); }catch(e){ return {error:'corrupt'}; }
    return { cid:compact.c, sid:compact.s||null, fid:compact.f||null, eid:compact.e||null, ver:compact.n, snap:expanded };
  }
  let p=null;
  try{ p=JSON.parse(raw); }catch(e){ return {error:'unrecognised'}; }
  if(!p || p.v!==1 || !p.cid) return {error:'unrecognised'};
  return { cid:p.cid, sid:p.sid||null, fid:p.fid||null, eid:p.eid||null, ver:p.ver, snap:p.snap };
}
/* single source for the handover QR payload */
function qrPayloadFor(s){
  console.info('[QR TRACE] qrPayloadFor() entered', { clientId:s.id, version:s.version });
  return encodeQrPayload(s);
}
function simulateScan(id){ closeScrim(); handleScannedPayload(qrPayloadFor(state.sessions[id])); }
function simulateScanRaw(raw){ closeScrim(); handleScannedPayload(raw); }
/* every scan — camera, image upload, or the demo picker — passes through
   here: schema validation, festival check, duplicate-import recognition,
   then adopt/merge/preserve, then the central station gate. Async because it
   needs to check the imported_events dedup store before deciding whether
   this scan is new work or a harmless re-scan of a handover already applied. */
async function handleScannedPayload(raw){
  const p=decodeQrPayload(raw);
  if(p.error==='checksum'){
    // Corrupted/truncated compressed payload — distinct from "not an OOXii
    // code" below, since the format WAS recognised, just damaged. Never
    // partially import: decodeQrPayload validates the checksum before
    // returning anything, so nothing has touched state or IndexedDB yet.
    showQRError('QR data is incomplete or damaged. Please generate a new QR.');
    return;
  }
  if(p.error || !p.cid || !acceptableId(p.cid)){
    showQRError('That QR code is damaged or is not an OOXii client code. Nothing was opened.');
    return;
  }
  const ctx = window.OOXII_BACKEND ? window.OOXII_BACKEND.getCachedContext() : null;
  if(ctx && p.fid && p.fid!==ctx.activeFestivalId){
    showQRError('This QR code is from a different festival. Nothing was opened.');
    return;
  }
  // Duplicate-import detection: the SAME handover (same event id, or same
  // client+version when the sender has no event id yet) already applied to
  // this device — e.g. the sender's QR screen scanned twice, or shown again
  // after the receiver already imported it. Recognise it and just reopen the
  // client; never re-merge or re-record it a second time.
  const importKey = p.eid || (p.cid+':'+(p.ver||0));
  if(window.OOXII_DB){
    let already;
    try{
      already = await window.OOXII_DB.importedEvents.has(importKey);
    }catch(e){
      // Cannot safely tell whether this was already imported — do NOT
      // silently assume "not a duplicate" and risk re-processing a handover
      // that already completed. Fail visibly instead of guessing.
      console.error('[OOXii] Could not check the import-dedup store', p.cid, e);
      showQRError('The QR was read, but this device could not check whether it was already imported. Please try again.');
      return;
    }
    if(already){
      const existing=state.sessions[p.cid];
      if(existing){ openSessionForActiveStation(existing); }
      else { showQRError('This QR code was already imported on this device, but that client is no longer here. Ask the previous station to show a fresh QR.'); }
      return;
    }
  }
  const existing=state.sessions[p.cid];
  let opened=null, isNewImport=false;
  if(!existing){
    // This device has never seen this client — the normal case for a real
    // offline handover between two devices with no server sync between
    // them. Adopt the snapshot carried in the QR rather than erroring out.
    if(!p.snap){ showQRError('Client '+p.cid+' is not on this device yet, and this QR code has no session data to import. Ask the previous station to show the QR again.'); return; }
    opened=Object.assign({id:p.cid}, p.snap);
    if(p.sid) opened._serverId=p.sid;
    isNewImport=true;
  } else if(p.snap && p.ver && p.ver > (existing.version||0)){
    // Already have a local copy, and the QR carries genuinely newer data —
    // merge it in. Never let an older QR snapshot silently overwrite newer
    // local data (same "local wins if newer" rule Search Client already
    // uses for the online/offline merge).
    opened=Object.assign({}, existing, p.snap, {id:p.cid});
    if(p.sid) opened._serverId=p.sid;
    isNewImport=true;
  } else {
    opened=existing;
    if(p.ver && existing && p.ver < (existing.version||0)){
      toast('That QR code is older than what’s already on this device — kept the newer local data.','warn');
    }
  }

  if(!isNewImport){
    // Nothing new to persist — just reopen what's already here.
    openSessionForActiveStation(opened);
    return;
  }

  if(!window.OOXII_DB){
    showQRError('The QR was read, but this device could not save the client. Please free storage and try again.');
    return;
  }

  // Steps 4-5: persist the adopted/merged session, then CONFIRM the write
  // actually landed (read it back) rather than trusting a non-throwing
  // put() alone. A failure here must not touch state.sessions, must not
  // mark the QR imported, and must not open the clinical workflow — the
  // tester can simply rescan to retry from the top.
  try{
    await window.OOXII_DB.sessions.put(opened);
    const verify = await window.OOXII_DB.sessions.get(opened.id);
    if(!verify || verify.version!==opened.version) throw new Error('readback mismatch after sessions.put');
    // The stable Supabase session UUID must survive the write unchanged —
    // confirming this here, not just .version, is what guarantees a QR-
    // imported session later syncs to the SAME canonical client_sessions
    // row the sender was writing to, not a new one.
    if(opened._serverId && verify._serverId!==opened._serverId) throw new Error('readback mismatch: _serverId did not persist');
  }catch(e){
    console.error('[OOXii] Failed to persist imported session to IndexedDB', p.cid, e);
    showQRError('The QR was read, but this device could not save the client. Please free storage and try again.');
    return;
  }

  // Step 6: only now that the durable write is confirmed does the live UI
  // adopt it.
  state.sessions[p.cid]=opened;
  if(!state.queue.includes(p.cid)) state.queue.unshift(p.cid);

  // Steps 7-8: audit trail + canonical-row safety net — records that a
  // handover landed on this device, with the full session snapshot, so a
  // later sync can build the server row even if the ORIGINAL device never
  // reconnects. Confirm the event actually reached the pending-events
  // outbox (or was already synced) before treating this as done.
  try{
    if(!window.OOXII_BACKEND) throw new Error('backend adapter unavailable');
    const event = await window.OOXII_BACKEND.recordEvent('QRImport', opened, getActiveTesterStation());
    if(!event || !event.id) throw new Error('recordEvent returned no event');
    const stored = await window.OOXII_DB.pendingEvents.get(event.id);
    const alreadySynced = stored ? true : await window.OOXII_DB.syncedEventIds.has(event.id);
    if(!stored && !alreadySynced) throw new Error('qr_imported event missing from pending_events after recordEvent');
  }catch(e){
    console.error('[OOXii] Failed to record the qr_imported audit event', p.cid, e);
    // Session data IS already durably saved (steps 4-5 succeeded) — only the
    // audit event failed. Do NOT mark the QR as imported and do NOT open the
    // clinical workflow: a rescan of the same QR is still safe (worst case
    // it just reopens the client without retrying the missing audit event).
    showQRError('The QR was read, but this device could not save the client. Please free storage and try again.');
    return;
  }

  // Step 9: only after BOTH prior writes are confirmed does this QR get
  // marked imported — a failure above leaves the dedup store untouched, so
  // a re-scan safely retries rather than silently skipping a handover that
  // never actually completed.
  try{
    await window.OOXII_DB.importedEvents.mark(importKey, {cid:p.cid, ver:p.ver||null});
  }catch(e){
    console.error('[OOXii] Failed to record this QR as imported (dedup store)', p.cid, e);
    showQRError('The QR was read and the client was saved, but this device could not record the handover. If you rescan, the client will just reopen — no data will be lost.');
    return;
  }

  // Step 10: only now does the clinical workflow open.
  openSessionForActiveStation(opened);
}
function showQRError(msg){
  scrim(`<div class="modal">
    <div class="ic sq" style="background:rgba(240,106,122,.12);border:1px solid rgba(240,106,122,.4);width:60px;height:60px;margin:0 auto 12px">${I('warn',30,'#f06a7a')}</div>

    <button class="btn btn-secondary" onclick="closeScrim()">Close</button>

/* ============================ QR HANDOVER MODAL (real QR + fallback) ============================ */
/* IndexedDB is the source of truth for what gets encoded — never generate a
   handover QR straight from in-memory state.sessions, which could in
   principle be ahead of (or behind) what's actually durably saved. Async:
   awaits the IndexedDB read before rendering anything. Not awaited by its
   callers (finishStationTask's `showHandoverQR(s.id, cont)`), because this
   function's real "completion" is the tester tapping Done/Close on the
   modal it shows, not its own promise settling — there is nothing for a
   caller to usefully await. */
async function showHandoverQR(id, after){
  console.info('[QR TRACE] showHandoverQR() entered', { clientId:id, fflateExists:!!window.fflate, QRCodeExists:!!window.QRCode });
  window.__qrAfter = after||null;
  if(!window.OOXII_DB){
    showQRGenerationError('This device could not read its saved copy of this client (local storage unavailable). Nothing was generated.');
    return;
  }
  let dbSession=null;
  try{
    dbSession = await window.OOXII_DB.sessions.get(id);
  }catch(e){
    console.error('[OOXii] Could not read the persisted session for QR generation', id, e);
    showQRGenerationError('This device could not read its saved copy of this client. Try again, or check available storage.');
    return;
  }
  if(!dbSession){
    showQRGenerationError('No saved data was found for this client on this device. Nothing was generated.');
    return;
  }
  const memSession = state.sessions[id];
  const dbVer = dbSession.version||0, memVer = memSession ? (memSession.version||0) : 0;
  if(memVer > dbVer){
    // The in-memory copy is AHEAD of what's durably saved — the latest
    // result has not actually finished persisting yet. Never generate a QR
    // from data that isn't safely on disk.
    showQRGenerationError('The latest result for this client has not finished saving to this device yet. Wait a moment and try again.');
    return;
  }
  // IndexedDB is the source of truth: use it, and if the in-memory copy was
  // stale (or missing), hydrate it from the persisted record rather than
  // ever letting older in-memory state overwrite what's on disk.
  const s = dbSession;
  // `_lastEventId` is deliberately never written to IndexedDB (it's local
  // sync-queue bookkeeping, not clinical data — see recordBackendEvent) so
  // it only ever exists on the in-memory object. Carry it over rather than
  // silently losing it when `s` is swapped to the IndexedDB-sourced record,
  // otherwise the QR's `eid` field (and the pending-event check just below)
  // would always look empty even right after a real save.
  if(memSession && memSession._lastEventId && memSession.version===s.version) s._lastEventId=memSession._lastEventId;
  if(memVer < dbVer || !memSession) state.sessions[id]=Object.assign({}, memSession, s);

  // Pre-render validation — a failure here must not produce an incomplete QR.
  const sid = window.OOXII_SESSIONS ? window.OOXII_SESSIONS.ensureServerId(s) : null;
  let nextStation=null;
  try{ nextStation = getRequiredStation(s); }catch(e){ nextStation=null; }
  if(!s.id || !sid || typeof s.version!=='number' || s.version<1 || !nextStation){
    console.error('[OOXii] Session failed pre-QR validation', {id:s.id, sid, version:s.version, nextStation});
    showQRGenerationError('This client’s saved record is incomplete on this device. Nothing was generated — try re-saving the last step.');
    return;
  }
  if(s._lastEventId){
    try{
      const [pendingRows, alreadySynced] = await Promise.all([
        window.OOXII_DB.pendingEvents.all(),
        window.OOXII_DB.syncedEventIds.has(s._lastEventId),
      ]);
      const hasPendingRecord = pendingRows.some(e=>e.id===s._lastEventId);
      if(!hasPendingRecord && !alreadySynced){
        showQRGenerationError('This client’s latest result was not recorded for sync on this device. Please re-save the last step before handing over.');
        return;
      }
    }catch(e){
      console.error('[OOXii] Could not verify the pending/synced event before QR generation', e);
      showQRGenerationError('This device could not confirm the latest result was saved for sync. Try again.');
      return;
    }
  }

  let payload=null;
  try{
    payload=qrPayloadFor(s);
    if(!payload) throw new Error('qrPayloadFor returned empty payload');
  }catch(e){
    console.error('[QR TRACE] showHandoverQR() failed to build the QR payload', { clientId:s.id, message:e.message, stack:e.stack });
    showQRGenerationError('This device could not build the handover QR for this client. Try again.');
    return;
  }
  // max-width bumped for this specific modal (not the shared .modal class)
  // so the 280px QR + its .qrbox padding fits without cropping — see
  // js/qr-service.js's QR_SIZE_PX.
  scrim(`<div class="modal" style="max-width:380px">
    <h3>Handover QR</h3>
    <div class="id-big">${s.id}</div>
    <p>Last completed: <b style="color:#fff">${lastCompletedStation(s)}</b> · Updated ${s.time||'—'}<br>
    Next step: <b style="color:#fff">${stepLabel(DE.getNextRequiredStep(s))}</b><br>Scan on the next station's device to continue.</p>
    <div class="qrbox" id="qr-target"></div>
    <p style="font-size:12px;margin-top:0">No personal data — anonymous clinical workflow only.</p>
    <button class="btn btn-primary" onclick="closeScrim();${after?'__qrAfter()':''}">Done</button>
  </div>`);
  const target=document.getElementById('qr-target');
  // renderQrInto never renders the raw JSON payload itself (that was the
  // reported production bug — a white box showing the JSON as text instead
  // of a scannable QR, caused by this vendored qrcodejs build throwing once
  // a fully-populated payload exceeded its capacity at the default
  // error-correction level). Any failure here — missing library, or a
  // genuine generation error — shows the same clear, non-technical message;
  // the real error is only ever logged to the console, never shown or
  // encoded into the visible UI.
  console.info('[QR TRACE] showHandoverQR() calling renderQrInto()', { clientId:s.id, payload_length: payload.length, OOXII_QR_exists: !!window.OOXII_QR, QRCodeExists: !!window.QRCode });
  let ok=false;
  try{
    ok = window.OOXII_QR ? window.OOXII_QR.renderQrInto(target, payload) : false;
  }catch(e){
    console.error('[QR TRACE] showHandoverQR() renderQrInto() threw unexpectedly', { clientId:s.id, message:e.message, stack:e.stack });
    ok=false;
  }
  console.info('[QR TRACE] showHandoverQR() renderQrInto() result', { clientId:s.id, ok });
  if(!ok){
    showQRGenerationError('Unable to generate QR code. Please try again.');
  }
}

/* ============================ field builders ============================ */
/* `opt()` only ever emits one <option> per entry already IN `options` — it
   never invents a blank one. Every fieldSelect() caller used to rely on a
   `{'':'Select…'}` label override that silently did nothing unless the
   caller ALSO happened to put '' in their own options array (a few did,
   most didn't) — with no option marked selected, the browser defaults to
   selecting the FIRST real value, so an untouched dropdown could silently
   carry a real clinical answer. fieldSelect() now always renders its own
   disabled placeholder option regardless of what `options` contains, and
   strips any stray '' the caller still passes so it's never duplicated. */
/* required=true by default (most clinical fields are); pass false explicitly
   for genuinely optional fields (frame size/colour, paddle's stated
   preference) — never the other way round. The asterisk is never the only
   indicator: the field also carries a real `required`/`aria-required`
   attribute, and saveXxx()'s existing validation is what actually blocks
   the save (see markFieldInvalid()). */
function fieldSelect(icon,label,help,id,options,val,placeholder,required=true){
  const ph = placeholder || 'Select an option';
  const hasVal = val!=null && val!=='';
  const clean = options.filter(o=>o!=='');
  return `<div class="frow" id="${id}-row"><div class="fic">${I(icon,22)}</div>
    <div class="flabel"><div class="l">${label}${required?' <span class="req-mark" aria-hidden="true">*</span>':''}</div>${help?`<div class="h">${help}</div>`:''}</div>
    <div class="fctl"><select id="${id}" ${required?'required aria-required="true"':''}><option value="" ${hasVal?'':'selected'} disabled>${ph}</option>${opt(clean,val)}</select></div></div>`;
}
function fieldSeg(icon,label,help,id,options,val,required=true){
  return `<div class="frow" id="${id}-row"><div class="fic">${I(icon,22)}</div>
    <div class="flabel"><div class="l">${label}${required?' <span class="req-mark" aria-hidden="true">*</span>':''}</div>${help?`<div class="h">${help}</div>`:''}</div>
    <div class="fctl"><div class="seg" id="${id}" role="group" ${required?'aria-required="true"':''}>${options.map(o=>`<button data-v="${o}" class="${val===o?'on':''}">${o}</button>`).join('')}</div></div></div>`;
}
/* Highlights the given field row (by the id passed to fieldSelect/fieldSeg/
   fieldNumber) with a red outline + inline message — the toast already
   names what's missing; this points at exactly which control it is.
   Clears itself the next time that control is used. */
/* Looks for `${id}-row` first (fieldSelect/fieldSeg/fieldNumber's own
   wrapper), falling back to a plain `${id}` element — a few hand-built
   conditional wrappers (e.g. the Wheel's *-wrap show/hide containers) are
   already addressable by that exact id and must not be renamed, since
   other code toggles their visibility by it. */
function markFieldInvalid(id, msg){
  const row = document.getElementById(id+'-row') || document.getElementById(id);
  if(!row) return;
  row.classList.add('field-invalid');
  let m = row.querySelector('.field-invalid-msg');
  if(!m){ m = document.createElement('div'); m.className='field-invalid-msg'; (row.querySelector('.flabel, .vhead')||row).appendChild(m); }
  m.textContent = msg || 'This field is required.';
  const clear = ()=>{ row.classList.remove('field-invalid'); if(m) m.remove(); };
  const ctl = row.querySelector('select, .seg, input');
  if(ctl) ctl.addEventListener(ctl.tagName==='SELECT'||ctl.tagName==='INPUT'?'change':'click', clear, {once:true});
}
function fieldNumber(icon,label,help,id,val,min,max,required=true){
  return `<div class="frow" id="${id}-row"><div class="fic">${I(icon,22)}</div>
    <div class="flabel"><div class="l">${label}${required?' <span class="req-mark" aria-hidden="true">*</span>':''}</div>${help?`<div class="h">${help}</div>`:''}</div>
    <div class="fctl"><input id="${id}" type="number" min="${min}" max="${max}" value="${val||''}" style="width:96px;text-align:center" ${required?'required aria-required="true"':''}></div></div>`;
}
/* stacked: chart glyph + label on top, full-width line dropdown below, eye colour-coded.
   Chart lines 0 (top, largest) to 11 (bottom, smallest) per the authoritative table. */
function fieldEyeLine(label,id,val,eye){
  const badge = eye==='r'?'<span class="eyebadge eye-r">R</span>'
    : eye==='l'?'<span class="eyebadge eye-l">L</span>'
    : '<span class="bothchip">Both eyes</span>';

/* segmented control wiring */
function wireSeg(id,cb){
  const seg=$('#'+id); if(!seg)return;
  seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    if(cb)cb(b.dataset.v);
  });
}
function segVal(id){const on=$('#'+id+' .on');return on?on.dataset.v:null;}

/* stepper (Distance / Wheel / Paddle / Dispense)
   Strictly position-based: a step can NEVER show complete ahead of the current step.
   Only steps before `current` get a check; `current` shows its icon; later steps are locked. */
function stepper(current, s){
  const icons={Distance:'glasses',Wheel:'wheel',Paddle:'paddle',Dispense:'glasses'};
  const idx = STEPPER.indexOf(current);
  let html='<div class="stepper">';
  html += `<div class="stepline ${idx>=1?'':'muted'}" style="left:14%;width:24%"></div>`;
  html += `<div class="stepline ${idx>=2?'':'muted'}" style="left:38.5%;width:24%"></div>`;
  html += `<div class="stepline ${idx>=3?'':'muted'}" style="left:63%;width:24%"></div>`;
  STEPPER.forEach((st,i)=>{
    let cls='step', inner;
    if(i < idx){ cls+=' done';    inner=I('check',26); }
    else if(i===idx){ cls+=' current'; inner=I(icons[st],24,'#fff'); }
    else { cls+=' locked'; inner=I(icons[st],24,'#7c83b4'); }
    html+=`<div class="${cls}"><div class="circ">${inner}</div><div class="lbl">${st}</div></div>`;
  });
  return html+'</div>';
}

/* ===== Honey Rewards: earning & reward moments =====
   Honey counts workflow-task completions (registration saved, station test saved,
   dispensing task done, exit counselling done) — participation only, never outcomes. */
function awardHoney(){
  const h=state.honey, prev=dailyBadge(h.today);
  h.today++; h.monthClients++; state.tester.clientsTotal++;
  if(!h.sessionDays.includes(h.day)) h.sessionDays.push(h.day); // festival session day counted on first task
  saveHoney();
  const badge=dailyBadge(h.today);
  return {badgeUp: !!badge && badge!==prev, badge};
}
/* subtle by design: a quiet toast per task; the one-time animated moment is
   reserved for daily badge upgrades so testing itself is never interrupted */
function honeyAfterSave(r,label,after){
  state.tester.lastHoney=label;
  toast('+1 🍯 '+label+' · '+state.honey.today+' today');
  if(r.badgeUp) showHoneyMilestone(r.badge, after);
  else if(after) after();
}
/* complete a station task: count honey, hand over, continue.
   Individual mode: same tester keeps the client — no device handover, so no QR stop. */
function finishStationTask(s,label,after){
  const r=awardHoney();
  const cont=()=>honeyAfterSave(r,label, after || (()=>afterStationSave(s)));
  if(isIndividualMode()) cont();
  else showHandoverQR(s.id, cont);
}

/* advance after a station save: generate QR, then route ONLY where the active
   station is permitted — otherwise hand over and return to the station dashboard */
function advance(s){
  s.time=nowTime();
  const next=DE.getNextRequiredStep(s);
  if(!s.path.includes(next)) s.path.push(next);
  if(!state.queue.includes(s.id)) state.queue.unshift(s.id);
  finishStationTask(s, s._stepLabel||'Station task complete');
}
function afterStationSave(s){
  if(canActiveTesterOpenSession(s)) routeToStep(s); // e.g. Near follows Distance at the same station
  else go(baseScreen());
}

/* Sign-out warns about unsynced records before wiping local clinical data —
   never silently discards work a tester hasn't synced yet. */
async function doLogout(){
  if(isDemoModeSession() || !window.OOXII_CONFIG_VALID){
    // Demo-user logout: clear the demo flag and the demo tester context,
    // return to the login/configuration choice screen. Deliberately does
    // NOT wipe IndexedDB clinical data here (unchanged from before this fix
    // — demo data is left alone, not auto-deleted) and does NOT immediately
    // re-enter Demo Mode — ScreenSignIn only does that if the flag is set
    // again, which it no longer is.
    exitDemoModeSession();
    state.authed=false; state.authMode=null; go(ScreenSignIn); return;
  }
  const r = await window.OOXII_AUTH.signOut({force:false});
  if(r.needsConfirmation){
    scrim(`<div class="modal">
      <div class="ic sq" style="background:rgba(245,185,69,.14);border:1px solid rgba(245,185,69,.4);width:60px;height:60px;margin:0 auto 12px">${I('warn',28,'#f5b945')}</div>
      <h3>Unsynced records</h3>
      <p>${r.pendingCount} record${r.pendingCount===1?'':'s'} on this device ${r.pendingCount===1?'has':'have'} not synced yet. Signing out now will make them unavailable until you sign back in on this device.</p>
      <button class="btn btn-primary" onclick="forceLogout()">Sign out anyway</button>
      <button class="btn btn-secondary" onclick="closeScrim()">Stay signed in</button>
    </div>`);
    return;
  }
  // Real-user logout: OOXII_AUTH.signOut() already signed out of Supabase
  // (when online) and cleared the offline permit + local context. Never
  // switch into Demo Mode here — ScreenSignIn shows the real login screen
  // (or Configuration Needed, if config somehow became invalid meanwhile).
  state.authed=false; state.authMode=null; go(ScreenSignIn);
}
async function forceLogout(){
  closeScrim();
  await window.OOXII_AUTH.signOut({force:true});
  state.authed=false; state.authMode=null; go(ScreenSignIn);
}

/* horizontal honeycomb progress bar — one hexagon per milestone chunk of the day.
   The most recently earned cell gently fills (subtle, one-shot animation). */
function honeycombRow(filled,total,mini=false){
  const R=mini?10:12, W=R*Math.sqrt(3), gap=3;
  const svgW=Math.ceil(total*(W+gap))+4, svgH=Math.ceil(R*2)+4;
  const pts=(cx,cy,r)=>Array.from({length:6},(_,i)=>{const a=(60*i-30)*Math.PI/180;return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(' ');
  let cells='';
  for(let i=0;i<total;i++){
    const cx=i*(W+gap)+W/2+2, cy=svgH/2;
    const f=i<filled, isNew=f&&i===filled-1;
    cells+=`<polygon points="${pts(cx,cy,R-1)}" ${isNew?'class="comb-new"':''}
      fill="${f?'url(#combg)':'rgba(255,255,255,0.05)'}"
      stroke="${f?'#c8860a':'rgba(255,255,255,0.18)'}" stroke-width="1.2"/>`;
  }
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;margin:0 auto" aria-hidden="true">
    <defs><radialGradient id="combg" cx="35%" cy="30%"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#d97706"/></radialGradient></defs>${cells}</svg>`;
}

/* ============================ HONEYCOMB SVG ============================ */
function honeycombSVG(filled,mini=false){
  const R=mini?13:19;
  const W=R*Math.sqrt(3), H=R*2;
  const cells=[];
  for(let row=0;row<4;row++){
    const even=row%2===0, cols=even?5:4, ox=even?0:W/2;
    for(let col=0;col<cols;col++) cells.push({cx:ox+col*W+W/2+5,cy:row*(H*.75)+R+5});
  }
  const svgW=Math.ceil(5*W+10), svgH=Math.ceil(3*(H*.75)+H+10);
  const gid=mini?'hgm':'hgf';
  const pts=(cx,cy,r)=>Array.from({length:6},(_,i)=>{const a=(60*i-30)*Math.PI/180;return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(' ');
  const hexes=cells.map(({cx,cy},i)=>{
    const f=i<filled;
    return `<polygon points="${pts(cx,cy,R-1.5)}" fill="${f?`url(#${gid})`:'rgba(255,255,255,0.05)'}" stroke="${f?'#c8860a':'rgba(255,255,255,0.12)'}" stroke-width="1.2"/>`;
  }).join('');
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;margin:0 auto"><defs><radialGradient id="${gid}" cx="35%" cy="30%"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#d97706"/></radialGradient></defs>${hexes}</svg>`;
}

/* ============================ boot ============================ */
/* seed() above already gave `state` a synchronous, always-valid demo baseline
   so every function that reads state.sessions/state.queue at parse time is
   safe. If IndexedDB has real persisted sessions (or the app is truly
   configured for a real backend), this async step swaps them in and the
   demo seed is dropped — see js/session-repository.js demoSeedAllowed(). */
/* Sessions persist across refresh/restart via this hydration step; signing
   in (online or offline-PIN) is still required every fresh load — session
   VALIDITY should be re-checked, not silently trusted, in a clinical app. */
(async function boot(){
  console.info('[AUTH TRACE] boot() entered', { testerNameAtParseTime: state.tester.name });
  try{
    if(window.OOXII_DB){
      const result = await window.OOXII_BACKEND.boot();
      if(!result.useDemoSeed){
        state.sessions = result.hydratedSessions;
        state.queue = result.hydratedQueue;
      }
    }
  }catch(e){
    if(e && e.code==='INDEXEDDB_BLOCKED'){
      // A real, reproduced failure mode: another tab has this device's
      // IndexedDB open at an older version, blocking this tab's connection
      // — the underlying request never resolves or rejects on its own (see
      // js/indexed-db.js's onblocked handler), so this must be surfaced
      // clearly rather than left to hang indefinitely or silently fall
      // through to sign-in with a broken local-storage layer.
      console.error('[OOXii] IndexedDB blocked by another open tab', e);
      screenEl().innerHTML = `<div class="pad">${header()}
        <div class="notice warn" style="margin-top:60px">
          <span class="x">${I('warn',22,'#f5b945')}</span>
          <div><div class="t">Another OOXii tab is open</div>
          <div class="s">This device's local storage is in use by another OOXii tab or window. Close it, then tap Retry.</div></div>
        </div>
        <button class="btn btn-primary" style="margin-top:16px" onclick="location.reload()">Retry</button>
      </div>`;
      return; // do not fall through to sign-in with a non-functioning local-storage layer
    }
    console.error('[OOXii] boot hydration failed, continuing with local demo data', e);
  }
  console.info('[AUTH TRACE] boot() calling go(ScreenSignIn)', { testerNameBeforeSignIn: state.tester.name });
  go(ScreenSignIn);
})();
</script>
