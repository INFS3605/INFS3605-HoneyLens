<!--
  OOXii Offline Eye Camp App — functional prototype
  Visual reference: the three supplied hi-fi screens (Home / Station data entry / Dispense).
  Implements: tester sign-in, camp home + handover queue, anonymous client intake with
  check-character IDs, distance/near/wheel/paddle data entry with automated Snellen results,
  station-gating decision engine, QR handover (real QR encoding via CDN with text fallback),
  dispense + sync queue. All data is in-memory; nothing leaves the browser.

  NOTE: clinical mappings (Snellen, lens recommendation) are plausible prototype logic for a
  walkable demo, not validated OOXii production values.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OOXii — Offline Eye Camp</title>
<!-- QR generation (unchanged from the original prototype) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- Real camera QR scanning (rear-camera preference, image-upload fallback) -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<!-- Supabase JS v2 (browser bundle) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!-- Backend config + modules — see BACKEND_IMPLEMENTATION_PLAN.md.
     js/config.js is gitignored; copy js/config.example.js to create it. -->
<script src="js/config.example.js"></script>
<script src="js/config.js" onerror="console.warn('[OOXii] js/config.js not found — copy js/config.example.js and fill in your Supabase project values.')"></script>
<script src="js/supabase-client.js"></script>
<script src="js/indexed-db.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/session-repository.js"></script>
<script src="js/sync-service.js"></script>
<script src="js/qr-service.js"></script>
<script src="js/backend-adapter.js"></script>
<style>
  :root{
    --bg-0:#15183c; --bg-1:#1e2157; --bg-2:#262a66;
    --surface:rgba(118,128,205,.12); --surface-2:rgba(120,131,210,.20);
    --border:rgba(154,164,228,.16); --border-2:rgba(154,164,228,.28);
    --teal:#14a8c5; --teal-2:#1cc3d6; --teal-deep:#0e83a0;
    --text:#ffffff; --dim:#a7add9; --dimmer:#7c83b4;
    --green:#4ade80; --green-bg:rgba(74,222,128,.12);
    --blue:#4d8bf5; --amber:#f5b945; --red:#f06a7a;
    --chip:rgba(96,104,190,.42); --paddle:#7d56c9;
    --shadow:0 14px 40px rgba(0,0,0,.45);
    --r:16px;
    font-synthesis:none;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    background:#0c0e24; color:var(--text);
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:18px;
  }
  /* tablet frame — landscape tablet first (see redesign notes) */
  #phone{
    width:min(1180px,97vw); max-width:100%; height:min(800px,94vh); min-height:560px;
    background:radial-gradient(120% 80% at 50% 0%,#23275f 0%,#1a1d4b 46%,#15183c 100%);
    border-radius:20px; position:relative; overflow:hidden;
    box-shadow:var(--shadow), 0 0 0 5px #05060f, 0 0 0 7px #1b1d3a;
  }
  #screen{position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch}
  #screen::-webkit-scrollbar{width:0}
  .pad{padding:24px 28px 30px; max-width:820px; margin:0 auto; width:100%; box-sizing:border-box}
  .pb{padding-bottom:120px}

  /* header */
  .topbar{display:flex; align-items:flex-start; justify-content:space-between; gap:10px}
  .logo{font-weight:800; font-size:30px; letter-spacing:1px; line-height:1}
  .logo b{color:#fff}
  .logo .dots{letter-spacing:3px}
  .offline-wrap{text-align:right}
  .pill{display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border-2);
    border-radius:999px; padding:7px 13px; font-size:13px; font-weight:600; color:var(--teal-2)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .offline-sub{font-size:13px; color:var(--dim); margin-top:6px}
  .client-sub{font-size:14px; color:var(--dim); margin-top:8px; font-weight:600}

  /* camp banner */
  .camp{display:flex; gap:14px; align-items:center; margin-top:22px}
  .camp-ic{width:56px;height:56px;border-radius:50%;background:linear-gradient(160deg,#16a7c4,#1184a0);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .camp h1{margin:0; font-size:25px; font-weight:800}
  .camp p{margin:3px 0 0; color:var(--dim); font-size:15px}

  /* action cards */
  .actions{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px}
  .action{
    background:linear-gradient(160deg,var(--teal) 0%,var(--teal-deep) 100%);
    border:none; border-radius:18px; padding:20px 14px; color:#fff; text-align:center;
    cursor:pointer; min-height:150px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; transition:transform .12s, filter .12s;
  }
  .action:active{transform:scale(.97)}
  .action[disabled]{opacity:.4; filter:grayscale(.3); cursor:not-allowed}
  .action .t{font-weight:800; font-size:17px}
  .action .s{font-size:13px; opacity:.92}

  /* section titles */
  .sec{display:flex; align-items:center; justify-content:space-between; margin:26px 2px 12px}
  .sec h2{margin:0; font-size:20px; font-weight:800}
  .sec .meta{color:var(--teal-2); font-size:14px; font-weight:600; display:flex; align-items:center; gap:7px}

  /* rows / cards */
  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--r)}
  .row{display:flex; align-items:center; gap:13px; padding:13px 15px; cursor:pointer;
    background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:10px}
  .row:active{background:var(--surface-2)}
  .ic{width:46px;height:46px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .ic.sq{border-radius:13px}
  .grow{flex:1; min-width:0}
  .row .name{font-weight:700; font-size:17px}
  .row .sub{color:var(--dim); font-size:13px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .chev{color:var(--dimmer); font-size:20px; flex:0 0 auto}

  .statpill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:6px 12px;
    font-size:13px;font-weight:700;border:1px solid transparent; white-space:nowrap}
  .s-ready{color:var(--green);border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.07)}
  .s-working{color:var(--blue);border-color:rgba(77,139,245,.4);background:rgba(77,139,245,.08)}
  .s-needs{color:var(--amber);border-color:rgba(245,185,69,.4);background:rgba(245,185,69,.08)}
  .s-offline{color:var(--dimmer);border-color:var(--border-2)}
  .s-error,.s-blocked,.s-conflict{color:var(--red);border-color:rgba(240,106,122,.4);background:rgba(240,106,122,.08)}
  .s-received{color:var(--blue);border-color:rgba(77,139,245,.4);background:rgba(77,139,245,.08)}
  .s-waiting{color:var(--amber);border-color:rgba(245,185,69,.4)}
  .time{color:var(--dim);font-size:13px;white-space:nowrap}

  /* footer privacy */
  .privacy{display:flex; gap:13px; align-items:center; margin-top:26px; color:var(--dim); font-size:13.5px; line-height:1.45}
  .privacy .shield{width:42px;height:42px;border-radius:50%;background:var(--surface);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .info-btn{margin-left:auto;width:34px;height:34px;border-radius:50%;border:1px solid var(--teal);
    color:var(--teal-2);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-style:italic;font-weight:700;flex:0 0 auto}

  /* stepper */
  .stepper{display:flex; align-items:flex-start; justify-content:space-between; margin:6px 6px 8px; position:relative}
  .step{display:flex;flex-direction:column;align-items:center;gap:9px;flex:1;position:relative;z-index:2}
  .step .circ{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--border-2); color:var(--dimmer); background:var(--bg-1)}
  .step.done .circ{background:var(--teal);border-color:var(--teal);color:#fff}
  .step.current .circ{background:var(--teal);border-color:var(--teal-2);color:#fff;
    box-shadow:0 0 0 5px rgba(28,195,214,.18), 0 0 18px rgba(28,195,214,.5)}
  .step .lbl{font-size:14px;font-weight:700;color:var(--text)}
  .step.locked .lbl{color:var(--dimmer)}
  .step.locked .circ{opacity:.7}
  .stepline{position:absolute;top:27px;height:2px;background:var(--teal);z-index:1}
  .stepline.muted{background:repeating-linear-gradient(90deg,var(--dimmer) 0 5px,transparent 5px 11px);opacity:.6}

  /* offline save banner */
  .savebanner{display:flex;gap:14px;align-items:center;background:linear-gradient(120deg,rgba(20,168,197,.16),rgba(20,168,197,.04));
    border:1px solid rgba(28,195,214,.25);border-radius:14px;padding:15px 16px;margin:18px 0}
  .savebanner .t{font-weight:700;font-size:16px}
  .savebanner .s{color:var(--dim);font-size:13px;margin-top:2px}

  /* form rows */
  .frow{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);
    border-radius:14px;padding:13px 14px;margin-bottom:11px;min-height:64px}
  .frow .fic{width:44px;height:44px;border-radius:12px;background:var(--chip);display:flex;
    align-items:center;justify-content:center;flex:0 0 auto;font-weight:800}
  .frow .flabel{flex:1;min-width:0}
  .frow .flabel .l{font-weight:700;font-size:16px}
  .frow .flabel .h{color:var(--dim);font-size:12.5px;margin-top:2px}
  .frow .fctl{flex:0 0 auto;display:flex;gap:8px;align-items:center}

  select,input[type=text],input[type=number],input[type=email],input[type=password]{
    background:rgba(10,12,40,.5);border:1px solid var(--border-2);color:#fff;border-radius:11px;
    padding:11px 13px;font-size:15px;font-family:inherit;min-width:0;outline:none;font-weight:600}
  select{appearance:none;-webkit-appearance:none;padding-right:34px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23a7add9' stroke-width='2.4'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center;cursor:pointer}
  input::placeholder{color:var(--dimmer)}
  select:focus,input:focus{border-color:var(--teal-2)}
  .full{width:100%}

  /* segmented */
  .seg{display:inline-flex;background:rgba(10,12,40,.5);border:1px solid var(--border-2);border-radius:11px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--dim);font-weight:700;font-size:15px;padding:11px 20px;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--teal);color:#fff}

  /* eye dropdown pill (R/L) */
  .eyectl{display:flex;align-items:center;gap:8px;background:rgba(10,12,40,.5);border:1px solid var(--border-2);
    border-radius:11px;padding:5px 6px 5px 5px}
  .eyebadge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .eye-r{background:#0d1640;color:#fff;border:2px solid var(--blue)}
  .eye-l{background:#fff;color:#1b1d3a}
  .eyectl select{border:none;background:transparent;padding:4px 26px 4px 2px;font-size:14px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%23a7add9' stroke-width='2.4'><path d='M6 9l6 6 6-6'/></svg>");
    background-position:right 6px center}

  .readout{background:rgba(28,195,214,.1);border:1px dashed rgba(28,195,214,.45);color:var(--teal-2);
    border-radius:11px;padding:11px 13px;font-weight:800;font-size:15px;text-align:center;min-width:96px}

  /* stacked vision-test field (roomy, touch-friendly, language-light) */
  .vfield{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:11px}
  .vhead{display:flex;align-items:center;gap:12px;margin-bottom:13px}
  .vhead .fic{width:44px;height:44px;border-radius:12px;background:var(--chip);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .vhead .l{font-weight:700;font-size:16.5px;flex:1;line-height:1.25}
  .vctl select.full{width:100%;padding:14px 38px 14px 15px;font-size:16px}
  .seg.full{display:flex;width:100%}
  .seg.full button{flex:1;padding:15px 0;font-size:16px}
  .bothchip{font-size:12px;font-weight:700;color:var(--dim);border:1px solid var(--border-2);border-radius:999px;padding:6px 12px;white-space:nowrap}

  /* illustrated instruction card (OOXii flat-illustration style) */
  .instruction{border-radius:16px;padding:16px 16px 14px;margin:18px 0 14px;
    background:linear-gradient(120deg,rgba(20,168,197,.10),rgba(20,168,197,.02));border:1px solid rgba(28,195,214,.22)}
  .instr-t{font-weight:800;font-size:17px}
  .instr-s{color:var(--dim);font-size:13.5px;margin-top:3px;line-height:1.45}
  .illo-frame{margin:14px auto 2px;width:172px;height:172px;border-radius:20px;background:rgba(120,131,210,.16);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
  .illo-frame svg{border-radius:14px;display:block}

  /* automatic result bar */
  .resultbar{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(28,195,214,.07);border:1px dashed rgba(28,195,214,.32);border-radius:12px;padding:11px 14px;margin:0 0 16px}
  .resultbar .lab{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:7px}
  .resultbar .sub{color:var(--dim);font-size:12px;margin-top:3px;display:block}

  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;border-radius:14px;
    padding:18px;font-size:18px;font-weight:800;cursor:pointer;border:none;font-family:inherit}
  .btn-primary{background:linear-gradient(120deg,var(--teal-2),var(--teal-deep));color:#fff}
  .btn-primary:disabled{opacity:.42;cursor:not-allowed}
  .btn-secondary{background:transparent;border:1px solid var(--border-2);color:#fff;margin-top:12px}
  .btn:active:not(:disabled){transform:scale(.99)}
  .btn-row{position:sticky;bottom:0;padding:16px 18px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,transparent,var(--bg-0) 38%)}

  /* back */
  .back{display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:var(--dim);
    font-size:15px;font-weight:600;cursor:pointer;margin-bottom:6px;padding:6px 0;font-family:inherit}

  /* status block (dispense) */
  .statusblock{display:flex;gap:14px;align-items:flex-start;margin:8px 0 18px}
  .statusblock .ok{width:54px;height:54px;border-radius:50%;background:rgba(74,222,128,.14);
    border:1px solid rgba(74,222,128,.4);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .statusblock h2{margin:0;font-size:23px}
  .statusblock p{margin:5px 0 0;color:var(--dim);font-size:14.5px}

  /* summary card rows */
  .sumcard{padding:6px 16px}
  .sumrow{display:flex;align-items:center;gap:13px;padding:15px 0;border-bottom:1px solid var(--border)}
  .sumrow:last-child{border-bottom:none}
  .sumrow .txt{flex:1}
  .sumrow .txt .a{font-weight:700;font-size:16px}
  .sumrow .txt .b{color:var(--dim);font-size:13px;margin-top:2px}
  .sumrow .val{text-align:right}
  .sumrow .val .a{font-weight:700;font-size:15px}
  .sumrow .val .b{font-size:15px;margin-top:2px}

  /* prescription card */
  .rx{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:18px 16px}
  .rx h4{margin:0 0 12px;display:flex;align-items:center;gap:9px;font-size:16px}
  .rx h4 .marker{width:14px;height:14px;border-radius:50%}
  .m-r{background:var(--blue);box-shadow:0 0 8px rgba(77,139,245,.6)}
  .m-l{background:#fff}
  .rxgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .ctxgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .rxcell{border:1px solid var(--border-2);border-radius:10px;padding:9px 11px;font-size:14px}
  .rxcell .k{color:var(--dim);font-size:11px;font-weight:700;letter-spacing:.4px}
  .rxcell .v{font-weight:700;margin-top:1px}
  .selected-lens{margin-top:12px}
  .selected-lens .k{color:var(--dim);font-size:12px;margin-bottom:6px}
  .lens-r{background:rgba(77,139,245,.9);border-radius:9px;padding:10px 12px;font-weight:700;font-size:13px}
  .lens-l{background:#fff;color:#1b1d3a;border-radius:9px;padding:10px 12px;font-weight:700;font-size:13px}

  /* transfer / qr card */
  .qrcard{display:flex;gap:15px;align-items:center;padding:18px 16px;margin-top:14px;cursor:pointer}
  .qrcard .t{font-weight:800;font-size:17px}
  .qrcard .s{color:var(--dim);font-size:13px;margin-top:3px;line-height:1.4}

  /* modal */
  .scrim{position:absolute;inset:0;background:rgba(6,7,20,.72);display:flex;align-items:center;justify-content:center;
    padding:20px;z-index:40;backdrop-filter:blur(3px)}
  .modal{background:linear-gradient(160deg,#252a66,#1b1e4d);border:1px solid var(--border-2);border-radius:22px;
    width:100%;max-width:330px;padding:24px 20px;text-align:center;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 4px;font-size:21px}
  .modal p{color:var(--dim);font-size:14px;margin:6px 0 16px;line-height:1.5}
  .qrbox{background:#fff;border-radius:16px;padding:16px;display:inline-block;margin:6px auto 14px}
  .qrbox img,.qrbox canvas{display:block;border-radius:6px}
  .qr-fallback{font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#1b1d3a;background:#fff;
    border-radius:12px;padding:14px;word-break:break-all;text-align:left;max-height:150px;overflow:auto}
  .modal .id-big{font-size:30px;font-weight:800;letter-spacing:2px;color:var(--teal-2);margin:2px 0 4px}

  /* blocking notice */
  .notice{display:flex;gap:13px;align-items:flex-start;border-radius:14px;padding:15px;margin:14px 0;
    background:rgba(240,106,122,.08);border:1px solid rgba(240,106,122,.35)}
  .notice.warn{background:rgba(245,185,69,.08);border-color:rgba(245,185,69,.4)}
  .notice .x{flex:0 0 auto;margin-top:1px}
  .notice .t{font-weight:700;font-size:15px}
  .notice .s{color:var(--dim);font-size:13.5px;margin-top:3px;line-height:1.45}

  /* role switcher */
  .rolebar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:14px 0 2px}
  .rolebar .lbl{color:var(--dim);font-size:12.5px;font-weight:600;margin-right:2px}
  .roletag{font-size:12.5px;font-weight:700;border:1px solid var(--border-2);color:var(--dim);
    background:none;border-radius:999px;padding:6px 11px;cursor:pointer;font-family:inherit}
  .roletag.on{background:var(--teal);border-color:var(--teal);color:#fff}
  .roletag[disabled]{opacity:.35;cursor:not-allowed}

  .hint{color:var(--dimmer);font-size:12.5px;text-align:center;margin-top:16px;line-height:1.5}
  .signin-field{margin-bottom:14px}
  .signin-field label{display:block;color:var(--dim);font-size:13px;font-weight:600;margin-bottom:7px}
  .checkrow{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:14px;margin:4px 0 22px;cursor:pointer}
  .checkbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-2);display:flex;align-items:center;justify-content:center}
  .checkbox.on{background:var(--teal);border-color:var(--teal)}
  .toast{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);background:#0c2630;border:1px solid var(--teal);
    color:#fff;padding:13px 20px;border-radius:12px;font-weight:600;font-size:14px;z-index:60;box-shadow:var(--shadow);
    display:flex;gap:10px;align-items:center;max-width:340px}
  .err{color:var(--red);font-size:13px;margin-top:6px;font-weight:600}

  /* ===== top navigation ===== */
  .topnav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 18px;
    border-bottom:1px solid var(--border);margin-bottom:20px}
  .topnav .logo{font-weight:800;font-size:28px;letter-spacing:1px;line-height:1}
  .topnav .logo b{color:#fff}
  .topnav .logo .dots{letter-spacing:3px}
  .nav-links{display:flex;gap:3px;align-items:center}
  .navbtn{background:none;border:none;color:var(--dim);font-size:13px;font-weight:700;
    padding:8px 12px;border-radius:10px;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;gap:6px;transition:background .12s,color .12s}
  .navbtn:hover{background:var(--surface);color:#fff}
  .navbtn.active{background:var(--surface-2);color:#fff}

<script>
/* ============================ camp configuration ============================ */
/* AUTHORITATIVE chart conversion table — OOXii walkthrough Appendix A.
   Chart lines run 0 (top, largest) to 11 (bottom, smallest). Each line has five
   letters and one 0.1 LogMAR step. Do not edit without an OOXii source. */
const ACUITY_TABLE = {
  0:  { logmar: 1.0,  snellenFeet: "20/200", snellenMetres: "6/60" },
  1:  { logmar: 0.9,  snellenFeet: "20/159", snellenMetres: "6/48" },
  2:  { logmar: 0.8,  snellenFeet: "20/126", snellenMetres: "6/38" },
  3:  { logmar: 0.7,  snellenFeet: "20/100", snellenMetres: "6/30" },
  4:  { logmar: 0.6,  snellenFeet: "20/80",  snellenMetres: "6/24" },
  5:  { logmar: 0.5,  snellenFeet: "20/63",  snellenMetres: "6/19" },
  6:  { logmar: 0.4,  snellenFeet: "20/50",  snellenMetres: "6/15" },
  7:  { logmar: 0.3,  snellenFeet: "20/40",  snellenMetres: "6/12" },
  8:  { logmar: 0.2,  snellenFeet: "20/32",  snellenMetres: "6/10" },
  9:  { logmar: 0.1,  snellenFeet: "20/25",  snellenMetres: "6/8" },
  10: { logmar: 0.0,  snellenFeet: "20/20",  snellenMetres: "6/6" },
  11: { logmar: -0.1, snellenFeet: "20/16",  snellenMetres: "6/5" }
};
const LINE_OPTS = Object.keys(ACUITY_TABLE).map(Number);            // 0..11

/* Clinical thresholds — OOXii walkthrough (binding):
   Distance: line 7 or better = PASS, line 6 or worse = FAIL.
   Near:     line 9 or better = PASS, line 8 or worse = FAIL. */
const DISTANCE_PASS_LINE = 7;
const NEAR_PASS_LINE = 9;

/* TEMPORARY PROTOTYPE ASSUMPTION: the app records right and left unaided distance
   results separately, but the supplied source does not define how they combine into
   one Distance outcome. Under "either_eye_fail", BOTH unaided eyes must reach line 7
   or better to pass; if EITHER eye is line 6 or worse the overall Distance outcome
   is fail. Confirm this aggregation rule with OOXii before clinical deployment. */
const DISTANCE_AGGREGATION_MODE = "either_eye_fail";

/* Paddle age-suggestion table — OOXii walkthrough (approximate guidance only).
   The ranges 45–49 and 49–52 overlap at age 49: this is NOT silently resolved
   (age 49 requires tester confirmation). No suggestion exists under age 45.
   The client's preference always overrides the suggestion. Age NEVER decides
   whether Paddle is required — only a failed Near test does. */
const PADDLE_AGE_SUGGESTIONS = [
  { min:45, max:49, power:'+1.00' },
  { min:49, max:52, power:'+1.50' },
  { min:53, max:57, power:'+2.00' },
  { min:58, max:62, power:'+2.50' },
  { min:63, max:Infinity, power:'+3.00' },
];
/* Registration captures broad age bands, not exact ages. A band only yields a
   confirmed suggestion when EVERY age in the band maps to one unambiguous power.
   Otherwise: "No confirmed automatic suggestion. Tester selection required." */
function suggestPaddlePower(ageBand){
  const bandRanges={'0–9':[0,9],'10–19':[10,19],'20–34':[20,34],'35–44':[35,44],'45–54':[45,54],'55–64':[55,64],'65+':[65,120]};
  const r=bandRanges[ageBand];
  if(!r) return {power:null, note:'No confirmed automatic suggestion. Tester selection required.'};
  if(r[1]<45) return {power:null, note:'No confirmed automatic suggestion (under 45). Tester selection required.'};
  const powers=new Set();
  for(let age=Math.max(r[0],45); age<=Math.min(r[1],120); age++){
    const hits=PADDLE_AGE_SUGGESTIONS.filter(x=>age>=x.min&&age<=x.max);
    if(hits.length!==1){ powers.add('ambiguous'); } // includes the unresolved age-49 overlap
    else powers.add(hits[0].power);
    if(r[0]<45) powers.add('ambiguous'); // band spans under-45 ages with no suggestion
  }
  if(powers.size===1 && !powers.has('ambiguous')) return {power:[...powers][0], note:null};
  return {power:null, note:'Age band '+ageBand+' spans multiple suggestions (age-49 overlap unresolved). Tester selection required.'};
}
const PADDLE_POWERS = ['+0.75','+1.00','+1.25','+1.50','+1.75','+2.00','+2.25','+2.50','+3.00'];
const LENS_POWERS = (()=>{const a=[];for(let v=-6;v<=6;v+=0.25)a.push((v>=0?'+':'')+v.toFixed(2));return a;})();
const VILLAGES = ['Port Vila','Mele','Pango','Lelepa','Erakor','Ifira','Eratap','Other (camp area)'];
const AGE_BANDS = ['0–9','10–19','20–34','35–44','45–54','55–64','65+'];
const DEVICES = [
  {role:'Registration', id:'REG-01',    status:'ready',   ic:'clipboard', col:'#6a5fd0'},
  {role:'Distance',     id:'DIST-02',   status:'ready',   ic:'glasses',   col:'#2f8fb3'},
  {role:'Wheel',        id:'WHEEL-01',  status:'ready',   ic:'wheel',     col:'#4a4fb0'},
  {role:'Paddle',       id:'PADDLE-01', status:'ready',   ic:'paddle',    col:'#7a52c0'},
  {role:'Dispense',     id:'DISP-01',   status:'working', ic:'glasses',   col:'#27a98a'},
];
/* the strict pipeline used for steppers + gating */
const FLOW = ['Registration','Distance','Near','Wheel','Paddle','Dispense'];
const STEPPER = ['Distance','Wheel','Paddle','Dispense']; // shown on data-entry screens (matches hi-fi)

/* tester-selectable stations for Eye Festival Mode.
   `key` is the internal station name used by STEP_STATION / DE.canOpenStep (unchanged);
   `label` is the user-facing wording. Near vision has NO station of its own — it stays
   mapped to Distance via STEP_STATION. 'Exit' is a non-clinical review station for
   finalised clients only (counselling + send-home); it adds no clinical steps. */
const STATIONS = [
  {key:'Registration', label:'Registration',       sub:'New clients & intake',        icon:'clipboard', col:'#6a5fd0'},
  {key:'Distance',     label:'Distance',           sub:'Distance + near vision',      icon:'glasses',   col:'#2f8fb3'},
  {key:'Wheel',        label:'Wheel',               sub:'Find the best lens',          icon:'wheel',     col:'#4a4fb0'},
  {key:'Paddle',       label:'Paddle',              sub:'Preferred reading power',     icon:'paddle',    col:'#7a52c0'},
  {key:'Dispense',     label:'Dispensing',          sub:'Confirm & give glasses',      icon:'lens',      col:'#27a98a'},
  {key:'Exit',         label:'Exit / Counselling',  sub:'Finished clients only',       icon:'exit',      col:'#b0762a'},
];

/* ============================ tiers & badges ============================ */
const TIERS=[
  {name:'Bronze',   min:0,   max:9,   color:'#cd7f32',light:'#e8a86c',glow:'rgba(205,127,50,.35)'},
  {name:'Silver',   min:10,  max:24,  color:'#a8bac8',light:'#d6e4ef',glow:'rgba(168,186,200,.35)'},
  {name:'Ruby',     min:25,  max:49,  color:'#e0115f',light:'#ff6b9d',glow:'rgba(224,17,95,.35)'},
  {name:'Gold',     min:50,  max:99,  color:'#f5b945',light:'#fde68a',glow:'rgba(245,185,69,.35)'},
  {name:'Diamond',  min:100, max:199, color:'#7dd3e8',light:'#c7edf7',glow:'rgba(125,211,232,.35)'},
  {name:'Sapphire', min:200, max:499, color:'#3b6be0',light:'#7fa8f5',glow:'rgba(59,107,224,.35)'},
  {name:'Platinum', min:500, max:Infinity,color:'#d4d0e8',light:'#ede8ff',glow:'rgba(212,208,232,.35)'},
];
function getTier(n){return TIERS.find(t=>n>=t.min&&n<=t.max)||TIERS[0];}

/* ============================ Honey Rewards ============================ */
/* Participation-only engagement system. Honey is earned for completing workflow
   tasks, handovers and admin contributions — NEVER for pass/fail results, glasses
   dispensed, referrals or speed. Badges unlock no clinical privileges. */
const DAILY_TARGET=60;   // clients that fill today's honeycomb
const COMB_CELLS=10;     // one hexagon per DAILY_TARGET/COMB_CELLS clients
const DAILY_MILESTONES=[
  {n:10, label:'Bronze Honey',   color:'#cd7f32'},
  {n:25, label:'Silver Honey',   color:'#a8bac8'},
  {n:40, label:'Gold Honey',     color:'#f5b945'},
  {n:60, label:'Platinum Honey', color:'#d4d0e8'},
];
function dailyBadge(n){ let b=null; for(const m of DAILY_MILESTONES) if(n>=m.n) b=m; return b; }
function nextDailyMilestone(n){ return DAILY_MILESTONES.find(m=>n<m.n)||null; }
const MONTHLY_LEVELS=[
  {n:0,   label:'Bronze Volunteer',   color:'#cd7f32'},
  {n:100, label:'Silver Volunteer',   color:'#a8bac8'},
  {n:300, label:'Gold Volunteer',     color:'#f5b945'},
  {n:800, label:'Platinum Volunteer', color:'#d4d0e8'},
];
function monthlyLevel(n){ let l=MONTHLY_LEVELS[0]; for(const m of MONTHLY_LEVELS) if(n>=m.n) l=m; return l; }
/* participation-only achievement cards (shown on the Profile page) */
const ACHIEVEMENTS=[
  {id:'firstfest', label:'First Festival Completed', desc:'Worked your first festival day',   test:st=>st.sessions>=1},
  {id:'hundred',   label:'100 Clients Supported',    desc:'Helped 100 clients all-time',      test:st=>st.total>=100},
  {id:'steady',    label:'Consistent Volunteer',     desc:'3 festival days this month',       test:st=>st.sessions>=3},
  {id:'champion',  label:'Community Champion',       desc:'250 clients supported all-time',   test:st=>st.total>=250},
  {id:'fivedays',  label:'Five Festival Days',       desc:'5 festival days this month',       test:st=>st.sessions>=5},
  {id:'fivehund',  label:'500 Clients Supported',    desc:'Helped 500 clients all-time',      test:st=>st.total>=500},
];

/* ============================ anonymous id w/ check char ============================ */
const A2Z='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function checkChar(letter,digits){
  const sum = A2Z.indexOf(letter)*7 + parseInt(digits,10)*3;
  return A2Z[(sum % 23)]; // deterministic 1-char check
}
function newAnonId(){
  const letter = A2Z[Math.floor(Math.random()*26)];
  const digits = String(Math.floor(Math.random()*100)).padStart(2,'0');
  return `${letter}${digits}-${checkChar(letter,digits)}`;
}
function validId(id){
  const m=/^([A-Z])(\d{2})-([A-Z])$/.exec(id||'');
  return !!m && checkChar(m[1],m[2])===m[3];
}

/* ============================ LogMAR / acuity calculator ============================ */
/* Each chart line = 0.1 LogMAR and five letters, so each correctly read letter on
   the next smaller line subtracts 0.02 (0.1 ÷ 5). LogMAR is system-calculated and
   never directly editable by the tester. */
function calculateLogMAR(lineReached, bonusLetters) {
  // reject missing input explicitly — Number(null)===0 would otherwise be
  // silently treated as a real "line 0" answer instead of "not answered"
  if (lineReached==null || lineReached==='' || bonusLetters==null || bonusLetters==='') return null;
  const line = Number(lineReached);
  const letters = Number(bonusLetters);
  if (!Number.isInteger(line) || line < 0 || line > 11) return null;
  if (!Number.isInteger(letters) || letters < 0 || letters > 4) return null;
  const base = ACUITY_TABLE[line].logmar;
  return Number((base - letters * 0.02).toFixed(2));
}
/* Five correct letters on the next line = that line is complete: normalise to
   line+1 with 0 bonus letters rather than recording five bonus letters. */
function normaliseChartResult(line, letters){
  if(line==null || line===''){ return null; } // "not answered" — never coerce to line 0
  let L=Number(line), B=Number(letters)||0;
  if(!Number.isInteger(L)) return null;
  while(B>=5 && L<11){ L+=1; B-=5; }
  if(L===11 && B>4) B=4; // bottom line: cap (no smaller line exists)
  if(B<0||B>4||L<0||L>11) return null;
  return {lineReached:L, bonusLetters:B};
}
/* read-only display label: LogMAR always shown alongside Snellen (never "+N" alone) */
function acuityLabel(line, letters){
  const lm=calculateLogMAR(line, letters);
  if(lm==null) return '—';
  const a=ACUITY_TABLE[line];
  return `${lm.toFixed(2)} LogMAR · ${a.snellenMetres}${letters>0?` +${letters}`:''}`;
}
/* build one stored chart-result record (raw values preserved + calculated LogMAR) */
function chartResult(line, letters){
  const n=normaliseChartResult(line, letters);
  if(!n) return null;
  return {lineReached:n.lineReached, bonusLetters:n.bonusLetters, logmar:calculateLogMAR(n.lineReached,n.bonusLetters)};
}

/* steps are not all stations: Near vision is performed at the Distance station */
const STEP_STATION = {Registration:'Registration', Distance:'Distance', Near:'Distance', Wheel:'Wheel', Paddle:'Paddle', Dispense:'Dispense', Exit:'Exit'};
/* user-facing step wording (single source for queue rows, scanner, search) */
const STEP_LABELS = {Registration:'Registration', Distance:'Distance test', Near:'Near test', Wheel:'Wheel test', Paddle:'Paddle test', Dispense:'Dispensing', Exit:'Exit / counselling', Complete:'Finished'};
function stepLabel(step){ return STEP_LABELS[step]||step; }

/* ============================ decision engine (OOXii walkthrough) ============================ */
/* Central outcome + route functions — the ONLY place thresholds live.
   Screens, buttons, QR handlers and seeds must never re-compare lines. */

/* Distance: line 7 or better = pass, line 6 or worse = fail (line <= 6 fails).
   Aggregation of right/left unaided eyes uses DISTANCE_AGGREGATION_MODE —
   a TEMPORARY prototype assumption pending OOXii confirmation (see constant). */
function getDistanceOutcome(session){
  const rightLine = Number(session.distance?.rightUnaided?.lineReached);
  const leftLine  = Number(session.distance?.leftUnaided?.lineReached);
  if(!Number.isInteger(rightLine) || !Number.isInteger(leftLine)) return null;
  if(DISTANCE_AGGREGATION_MODE === "either_eye_fail"){
    return rightLine >= DISTANCE_PASS_LINE && leftLine >= DISTANCE_PASS_LINE ? "pass" : "fail";
  }
  return null;
}
/* Near: line 9 or better = pass, line 8 or worse = fail. Both eyes, unaided.
   Age plays NO part in the near outcome or in whether Paddle is required. */
function getNearOutcome(session){
  const nearLine = Number(session.near?.unaided?.lineReached);
  if(!Number.isInteger(nearLine)) return null;
  return nearLine >= NEAR_PASS_LINE ? "pass" : "fail";
}
/* Route is calculated ONLY once both pre-tests are complete — never after
   Distance alone, and a client is never sent to Wheel before Near. */
function computeRoute(session){
  const distance = getDistanceOutcome(session);
  const near = getNearOutcome(session);
  if(!distance || !near) return null;
  if(distance === "pass" && near === "pass") return "none";
  if(distance === "pass" && near === "fail") return "paddle_only";
  if(distance === "fail" && near === "pass") return "wheel_only";
  return "wheel_then_paddle";
}
/* required path after the pre-tests, per route */
const ROUTE_PATHS = {
  none:              ['Exit'],
  paddle_only:       ['Paddle','Dispense'],
  wheel_only:        ['Wheel','Dispense'],
  wheel_then_paddle: ['Wheel','Paddle','Dispense'],
};
/* the terminal step a completed session is reviewed at */
function terminalStep(s){ return computeRoute(s)==='none' ? 'Exit' : 'Dispense'; }

const DE = {
  isIntakeComplete: s => !!(s.intake && s.intake.ageBand && s.intake.gender && s.intake.village && s.intake.cataract && s.intake.sessionType),
  /* both unaided eyes recorded, glasses question answered, and — when the client
     has own distance glasses — the with-glasses result recorded too */
  isDistanceComplete: s => !!(s.distance
    && Number.isInteger(s.distance.rightUnaided?.lineReached)
    && Number.isInteger(s.distance.leftUnaided?.lineReached)
    && s.distance.hasGlasses!=null
    && (!s.distance.hasGlasses || Number.isInteger(s.distance.ownGlasses?.lineReached))),
  isNearComplete: s => !!(s.near
    && Number.isInteger(s.near.unaided?.lineReached)
    && s.near.hasReading!=null
    && (!s.near.hasReading || Number.isInteger(s.near.ownGlasses?.lineReached))),
  isWheelComplete: s => {
    const w=s.wheel; if(!w || !(w.pd>=52 && w.pd<=78)) return false;
    const eyeDone = e => !!(e && e.lensType
      && (e.lensType==='Neither' || e.spherePower)
      && e.colourTestResult && e.canReadLine9OrSmaller!=null && e.visionImproved!=null
      && (!e.addOnUsed || e.addOnPower)
      && (!e.toricUsed || (e.toricPower && Number.isInteger(e.toricAxis) && e.toricAxis>=0 && e.toricAxis<=180)));
    return eyeDone(w.right) && eyeDone(w.left);
  },
  isPaddleComplete: s => !!(s.paddle && s.paddle.selectedPower),
  isDispenseComplete: s => !!(s.dispense && s.dispense.glassesDispensed!=null),
  isExitComplete: s => !!(s.exit && s.exit.counsellingDone),

  /* the single state machine: Registration → Distance → Near → route path → Complete */
  getNextRequiredStep(s){
    if(!DE.isIntakeComplete(s)) return 'Registration';
    if(!DE.isDistanceComplete(s)) return 'Distance';
    if(!DE.isNearComplete(s)) return 'Near';
    const route=computeRoute(s); // non-null: both pre-tests are complete here
    for(const step of ROUTE_PATHS[route]){
      if(step==='Wheel'    && !DE.isWheelComplete(s))    return 'Wheel';
      if(step==='Paddle'   && !DE.isPaddleComplete(s))   return 'Paddle';
      if(step==='Dispense' && !DE.isDispenseComplete(s)) return 'Dispense';
      if(step==='Exit'     && !DE.isExitComplete(s))     return 'Exit';
    }
    return 'Complete';
  },
  /* Dispensing gate — route-specific, never available on route "none" */
  canDispense(s){
    const route=computeRoute(s);
    if(!route || route==='none') return false;
    if(route==='paddle_only') return DE.isPaddleComplete(s);
    if(route==='wheel_only')  return DE.isWheelComplete(s);
    return DE.isWheelComplete(s) && DE.isPaddleComplete(s); // wheel_then_paddle: both, in order
  },
  // station gating: may a device at `role` open this session now?
  canOpenStep(s, role){
    if(role==='Supervisor') return true; // legacy role — no longer selectable in the UI
    const step = DE.getNextRequiredStep(s);
    if(step==='Complete') return role===STEP_STATION[terminalStep(s)]; // read-only review only
    return STEP_STATION[step]===role;
  }
};
/* central guards (spec names) — every navigation attempt funnels through these */
function canEnterStep(s, requestedStep){
  const next=DE.getNextRequiredStep(s);
  if(next===requestedStep) return true;
  return next==='Complete' && requestedStep===terminalStep(s); // completed: read-only review
}
function canCompleteStep(s, step){
  if(!canEnterStep(s,step)) return false;
  if(step==='Dispense') return DE.canDispense(s);
  return true;
}
function canDispense(s){ return DE.canDispense(s); }

/* ============================ active-station helpers ============================ */
/* Single source of truth for "which tester station is this device working as" and
   "may this tester open this client". ALL open paths (QR scan, search, queue rows,
   direct screen renders, post-save routing) must go through these — never compare
   stations inline in event handlers. */
function getActiveTesterStation(){ return state.role || null; }
/* Individual Testing mode: one tester takes a client through EVERY step themselves
   (used when festival stations are not running). Station gating is waived, but the
   decision engine's step ORDER stays fully enforced via guardStep/routeToStep. */
function isIndividualMode(){ return state.mode==='individual'; }
function setTesterMode(mode){

function activeContextLabel(){

/* ID acceptance for scans/search: correct anonymous format AND (check character valid
   OR already a known local session — the demo seed IDs predate the check-char rule) */
function acceptableId(id){

}
function setActiveTesterStation(st){

/* ============================ real station-assignment enforcement ============================ */
/* Station keys here (Registration/Distance/Wheel/Paddle/Dispense/Exit) are the
   SAME identifiers used in STATIONS[].key, STEP_STATION and the database's
   festival_members.allowed_stations CHECK constraint (see
   supabase/migrations/001_ooxii_backend.sql) — 'Dispense' is the shared
   internal key everywhere; 'Dispensing' is only ever a display label. This
   is what "station names match the database values exactly" means in
   practice: one identifier, never re-derived or re-typed per screen. */
function getActiveFestivalMembership(){
  const ctx = window.OOXII_BACKEND ? window.OOXII_BACKEND.getCachedContext() : null;
  if(!ctx || !ctx.festivals) return null;
  return ctx.festivals.find(f=>f.festivalId===ctx.activeFestivalId) || null;
}
/* true only when signed in against a real, configured backend (not demo mode) —
   demo mode has no real roster, so every station stays open, matching its
   existing "walkable without a backend" purpose. */
function stationRestrictionActive(){
  return !!(window.OOXII_CONFIG_VALID && !isDemoModeUrl() && window.OOXII_BACKEND && window.OOXII_BACKEND.getCachedContext());
}
/* null = unrestricted (demo/no backend); array = this tester's real allowed_stations
   for their active festival (possibly empty = no station assignment at all). */
function allowedStationsForTester(){
  if(!stationRestrictionActive()) return null;
  const m = getActiveFestivalMembership();
  return m ? (m.allowedStations||[]) : [];
}
function isStationAllowed(key){
  const allowed = allowedStationsForTester();
  return allowed===null || allowed.includes(key);
}
/* switching festivals clears the active station — a station assignment is
   always scoped to one festival, never carried over to another. */
async function switchActiveFestival(festivalId){
  const ctx = window.OOXII_BACKEND.getCachedContext();
  if(!ctx) return;
  ctx.activeFestivalId = festivalId;
  window.OOXII_BACKEND.refreshCachedContext(ctx);
  if(window.OOXII_DB) await window.OOXII_DB.context.set(ctx);
  const label = (ctx.festivals.find(f=>f.festivalId===festivalId)||{}).festivalName || 'festival';
  setActiveTesterStation(null);
  toast('Switched to '+label);
  go(ScreenFestival);
}
function getRequiredStep(s){ return DE.getNextRequiredStep(s); }
/* step → permitted station (Near is performed at the Distance station);
   completed sessions belong to their terminal station for read-only review. */
function getRequiredStation(s){
  const step=DE.getNextRequiredStep(s);
  return STEP_STATION[step==='Complete' ? terminalStep(s) : step];
}
function canActiveTesterOpenSession(s){
  if(!s) return false;
  if(isIndividualMode()) return true; // no station gate — step order still enforced by guardStep
  const st = getActiveTesterStation();
  return !!st && DE.canOpenStep(s, st);
}
/* queue entries whose next required station matches the active station */
function getClientsForActiveStation(){
  const st = getActiveTesterStation(); if(!st) return [];
  return state.queue.map(id=>state.sessions[id])
    .filter(s=>s && canActiveTesterOpenSession(s) && DE.getNextRequiredStep(s)!=='Complete');
}
/* clients whose work at the active station is already done (derived from existing
   DE completion checks — no separate queue data structure exists in this prototype) */
function getCompletedAtActiveStation(){
  const st = getActiveTesterStation(); if(!st) return [];
  const doneHere = s => ({
    Registration: DE.isIntakeComplete(s),
    Distance:     DE.isDistanceComplete(s) && DE.isNearComplete(s), // both steps live at this station
    Wheel:        DE.isWheelComplete(s),
    Paddle:       DE.isPaddleComplete(s),
    Dispense:     DE.isDispenseComplete(s),
    Exit:         DE.isExitComplete(s),
  }[st] || false);
  return state.queue.map(id=>state.sessions[id]).filter(s=>s && doneHere(s));
}
/* the ONLY way any UI path may open a client's workflow screen */
function openSessionForActiveStation(s){
  if(!canActiveTesterOpenSession(s)){ showWrongStationModal(s); return false; }
  state.activeId = s.id;
  go(()=>routeToStep(s));
  return true;
}
function baseScreen(){
  if(isIndividualMode()) return ScreenIndividual;
  return getActiveTesterStation() ? ScreenFestivalDashboard : ScreenHome;
}
function backToBase(){ go(baseScreen()); }
/* central per-screen guard: every clinical screen calls this before rendering.
   Blocks direct navigation, restored sessions and back-navigation bypasses.
   Uses canEnterStep() — the single sequence authority — so no screen can open
   out of clinical order in either Festival or Individual mode. */
function guardStep(step){
  const s = state.activeId ? state.sessions[state.activeId] : null;
  if(!s){ go(ScreenHome); return null; }
  if(!canActiveTesterOpenSession(s)){ go(baseScreen()); showWrongStationModal(s); return null; }
  if(!canEnterStep(s, step)){ routeToStep(s); return null; } // auto-correct to the required step
  return s;
}

/* ============================ recorded-result summaries ============================ */
/* Built ONLY from values the testers actually recorded. No invented cylinders,
   axes, default powers, lens materials or coatings. The formula for combining
   sphere + add-on + toric into one final prescription is NOT in the supplied
   source: spherical total = sphere + add-on power is shown, toric power/axis are
   kept as separate components, and the full combination rule is labelled
   unresolved pending OOXii confirmation. */
function sphericalTotal(eye){
  if(!eye || !eye.spherePower) return null;
  const sph=parseFloat(eye.spherePower);
  const add=eye.addOnUsed && eye.addOnPower ? parseFloat(eye.addOnPower) : 0;
  if(!Number.isFinite(sph)) return null;
  const t=sph+add;
  return (t>=0?'+':'')+t.toFixed(2);
}
function bestLensLabel(eye){
  if(!eye || !eye.lensType) return '—';
  if(eye.lensType==='Neither') return 'No lens improved vision';
  const parts=['Sphere '+(eye.spherePower||'—')];
  if(eye.addOnUsed && eye.addOnPower) parts.push('add-on '+eye.addOnPower+' (total '+(sphericalTotal(eye)||'—')+')');
  if(eye.toricUsed && eye.toricPower!=null) parts.push('toric '+eye.toricPower+' @ '+eye.toricAxis+'° (separate component)');
  return parts.join(' · ');
}

/* Honey Rewards progress — persisted so it survives refreshes.
   Daily counters reset at the start of each festival day; monthly counters reset
   at the start of each month; session days accumulate within the month. */
function todayStr(){ // LOCAL date — a festival day rolls over at local midnight, not UTC
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function monthStr(){ return todayStr().slice(0,7); }
function loadHoney(){
  let h=null; try{ h=JSON.parse(localStorage.getItem('hl_honey')); }catch(e){}
  if(!h||typeof h!=='object') h={};
  if(h.day!==todayStr()){ h.day=todayStr(); h.today=0; }            // daily reset
  if(h.month!==monthStr()){ h.month=monthStr(); h.monthClients=0; h.sessionDays=[]; } // monthly reset
  h.today=h.today||0; h.monthClients=h.monthClients||0; h.sessionDays=h.sessionDays||[];
  return h;
}

async function doOnlineSignIn(){
  const email=$('#si-email').value.trim(), pass=$('#si-pass').value;
  const err=$('#si-err'), btn=$('#si-btn');
  if(!email || !pass){ err.style.display='block'; err.textContent='Enter your email and password.'; return; }
  err.style.display='none'; btn.disabled=true; btn.textContent='Signing in…';
  const r = await window.OOXII_AUTH.signInOnline(email, pass);
  btn.disabled=false; btn.textContent='Sign in';
  if(!r.ok){ err.style.display='block'; err.textContent=r.error; return; }
  applyAuthContext(r.context);
  window.OOXII_BACKEND.refreshCachedContext(r.context);
  promptOfflinePinSetup();
}
function promptOfflinePinSetup(){
  scrim(`<div class="modal">
    <div class="ic sq" style="background:var(--chip);width:60px;height:60px;margin:0 auto 12px">${I('shield',28,'#1cc3d6')}</div>

    <p>This lets you use OOXii for up to 30 days without internet. Choose a 4–8 digit PIN — not your account password.</p>
    <input id="pin-set" class="full" type="password" inputmode="numeric" maxlength="8" placeholder="4–8 digit PIN" style="text-align:center;font-size:20px;letter-spacing:4px;margin-bottom:10px">

}
async function confirmOfflinePinSetup(){
  // NOT $('#pin-set') — $() is scoped to #screen, but scrim() modals mount
  // into #phone (a sibling of #screen), so that lookup always returns null
  // here. Use a plain document lookup for anything inside a scrim modal.
  const pin=document.getElementById('pin-set').value;
  const r = await window.OOXII_AUTH.setOfflinePin(pin);
  if(!r.ok){ const e=document.getElementById('pin-set-err'); e.style.display='block'; e.textContent=r.error; return; }
  closeScrim();
  toast('Offline access ready for 30 days');

    if(!status.exists || !status.valid){
      screenEl().innerHTML = `<div class="pad">

async function doOfflineUnlock(){
  const pin=$('#si-pin').value, err=$('#si-err');
  const r = await window.OOXII_AUTH.unlockOffline(pin);
  if(!r.ok){ err.style.display='block'; err.textContent=r.error; return; }
  applyAuthContext(r.context);
  window.OOXII_BACKEND.refreshCachedContext(r.context);
  toast('Signed in offline','cloud');
  go(ScreenHome);
}

/** Map the backend auth context onto the existing `state.tester` shape the
    UI already renders everywhere — no screen needed to change for this. */
function applyAuthContext(ctx){
  state.authed = true;
  state.tester.name = ctx.displayName;
  state.tester.email = ctx.email || state.tester.email;
  state.tester.testerId = ctx.userId ? ctx.userId.slice(0,8).toUpperCase() : state.tester.testerId;
  if(ctx.festivals && ctx.festivals[0]){
    state.tester.camp = ctx.festivals[0].festivalName;
  }
}

}

function startNewClient(){
  // station validation — registration happens at the Registration station,
  // or anywhere in Individual Testing mode (registration is the first step of the sequence)
  if(!isIndividualMode() && getActiveTesterStation()!=='Registration'){
    showWrongStationModal(null,'Registration','New clients are registered at the Registration station.');
    return;
  }
  const id=newAnonId();
  state.sessions[id]={id,status:'Draft',dir:'out',time:nowTime(),path:['Registration'],version:1,
    intake:{sessionType:'Individual'},distance:null,near:null,wheel:null,paddle:null,dispense:null};
  state.activeId=id;
  go(ScreenIntake);
}

function saveIntake(){
  const s=state.sessions[state.activeId];

    const e=$('#notes-err'); e.style.display='block'; e.textContent='That looks like personal data (number/email). Remove it before saving.'; return;
  }
  s.intake={
    ageBand:$('#in-age').value, gender:segVal('in-gender'), village:$('#in-village').value,
    cataract:$('#in-cat').value, sessionType:segVal('in-type'), notes
  };
  if(!s.intake.ageBand||!s.intake.gender||!s.intake.village||!s.intake.cataract){ toast('Complete all required fields','warn'); return; }
  s.status='In Progress'; s.path=['Registration','Distance']; s.dir='out'; s.time=nowTime(); s.version++;
  if(!state.queue.includes(s.id)) state.queue.unshift(s.id);
  recordBackendEvent('Registration', s, 'Registration');
  finishStationTask(s,'Registration complete');
}
/* Fire-and-forget local-first persistence + sync queue hook (see
   js/backend-adapter.js). Called AFTER the decision engine + screen code
   above has already validated and mutated state.sessions — never before,
   and never awaited, so the clinical UI is never blocked on IndexedDB or
   the network. */
function recordBackendEvent(step, s, station){
  if(window.OOXII_BACKEND){
    window.OOXII_BACKEND.recordEvent(step, s, station || getActiveTesterStation())
      .catch((e)=>console.error('[OOXii] recordEvent failed', step, e));
  }
}

function readEyeForm(p){
  const lensType=$('#w-'+p+'-type').value;
  const colourTestResult=$('#w-'+p+'-colour').value;
  const read9=segVal('w-'+p+'-read9'), improved=segVal('w-'+p+'-improved');
  const addonV=segVal('w-'+p+'-addon'), toricV=segVal('w-'+p+'-toric');
  if(!lensType || !colourTestResult || !read9 || !improved || !addonV || !toricV) return {error:'Complete every field for this eye'};
  if((lensType==='Plus'||lensType==='Minus') && !$('#w-'+p+'-sph').value) return {error:'Select the spherical component'};
  const addOnUsed=addonV==='Yes';
  if(addOnUsed && !$('#w-'+p+'-addonpow').value) return {error:'Select the add-on power'};
  const toricUsed=toricV==='Yes';
  const toricAxis=toricUsed?+$('#w-'+p+'-toricaxis').value:null;
  if(toricUsed && (!$('#w-'+p+'-toricpow').value || !Number.isInteger(toricAxis) || toricAxis<0 || toricAxis>180)) return {error:'Toric power and axis (0–180°) are required'};
  const eye={
    lensType, spherePower:(lensType==='Plus'||lensType==='Minus')?$('#w-'+p+'-sph').value:null,
    addOnUsed, addOnPower:addOnUsed?$('#w-'+p+'-addonpow').value:null,
    colourTestResult, canReadLine9OrSmaller:read9==='Yes', visionImproved:improved==='Yes',
    postWheelLine:null, postWheelBonusLetters:0, postWheelLogMAR:null,
    toricUsed, toricPower:toricUsed?$('#w-'+p+'-toricpow').value:null, toricAxis
  };
  eye.bestLens=bestLensLabel(eye);
  return {eye};
}
function saveWheel(){
  const s=state.sessions[state.activeId]; if(!canCompleteStep(s,'Wheel')){ backToBase(); return; }
  const pd=+$('#w-pd').value;
  if(!(pd>=52&&pd<=78)){ toast('PD must be between 52 and 78','warn'); return; }
  const r=readEyeForm('r'), l=readEyeForm('l');
  if(r.error){ toast('Right eye: '+r.error,'warn'); return; }
  if(l.error){ toast('Left eye: '+l.error,'warn'); return; }
  s.wheel={ pd, right:r.eye, left:l.eye, testerId:state.tester.testerId, deviceId:state.device, recordedAt:nowTime() };
  s.version++; s._stepLabel='Wheel test done'; recordBackendEvent('Wheel', s, 'Wheel'); advance(s);

function saveForSync(){

  s.syncStatus='Queued';
  // reflect on home queue
  const qi=state.queue.indexOf(s.id); if(qi>-1){ state.sessions[s.id].time=nowTime(); }
  toast('Saved to sync queue');

async function manualSyncNow(){

  else if(r.reason==='session_expired'){ toast('Your session expired — sign in online again','warn'); }
  else { toast('Could not sync — will retry automatically','warn'); }

}

/* Local-first, IndexedDB always checked first so this works offline; when
   online it's enhanced with a scoped server lookup — see
   OOXII_BACKEND.searchClient() for the merge/status logic. All DB access
   (IndexedDB and Supabase) lives there, not here. */
async function searchClient(){
  const id=$('#sc-id').value.trim().toUpperCase();
  const err=$('#sc-err'), out=$('#sc-result');
  err.style.display='none'; out.innerHTML='';
  window.__lastSearchResult = null;
  if(!acceptableId(id)){ err.style.display='block'; err.textContent='Not a valid anonymous ID. Format: letter, two digits, dash, check letter (A47-K).'; return; }

  if(!window.OOXII_BACKEND){ // demo/no-backend fallback: local state only
    const s=state.sessions[id];
    if(!s){ err.style.display='block'; err.textContent='No client '+id+' on this device.'; return; }
    out.innerHTML=searchResultCard(s,'local_only');
    return;
  }
  out.innerHTML='<div class="hint">Searching…</div>';
  const result = await window.OOXII_BACKEND.searchClient(id);
  if(!result){ out.innerHTML=''; err.style.display='block'; err.textContent='No client '+id+' found on this device or in your festival.'; return; }
  window.__lastSearchResult = result;
  out.innerHTML=searchResultCard(result.session, result.syncStatus);
}
const SYNC_STATUS_LABEL = {
  local_only: ['Local only', 's-offline'], pending: ['Pending sync', 's-waiting'],
  synced: ['Synced', 's-ready'], conflicted: ['Conflicted', 's-blocked'], finalised: ['Finalised', 's-received'],
};
/* Opens a search result the same way any other client is opened — through
   the central station gate — after making sure a server-only find (never
   seen on this device before) is first written into state.sessions/IndexedDB
   so the unchanged clinical screens have something to read from. */
async function openSearchResult(clientId){
  const result=window.__lastSearchResult;
  if(!result || result.session.id!==clientId) return;
  if(!state.sessions[clientId]){
    state.sessions[clientId]=result.session;
    if(!state.queue.includes(clientId)) state.queue.unshift(clientId);
    if(result.source==='server' && window.OOXII_DB) await window.OOXII_DB.sessions.put(result.session);
  }
  openSessionForActiveStation(state.sessions[clientId]);
}

/* single source for the handover QR payload (structure unchanged; tid added — backward compatible) */
/* QR is a routing token, not the clinical database — only what the next
   station needs. `fid` (festival id) is a backward-compatible addition: old
   payloads without it still validate, but a mismatched fid on a configured
   backend is rejected as "wrong festival". */
function qrPayloadFor(s){
  const ctx = window.OOXII_BACKEND ? window.OOXII_BACKEND.getCachedContext() : null;
  return JSON.stringify({
    v:1, camp:'PVEC-VU', cid:s.id, sid:'uuid-'+s.id, fid: ctx?ctx.activeFestivalId:null,
    step:DE.getNextRequiredStep(s), status:s.status, ver:s.version, ts:Date.now(),
    dev:state.device, tid:state.tester.testerId, mac:'sig:'+(s.version*7+s.id.length),
    snap: qrSnapshotOf(s),
  });
}
/* The actual clinical state, carried IN the QR itself. Required for a
   genuinely offline handover: two devices that have never synced (no
   internet, ever) have no other way to share this client's data — the QR
   IS the only channel. Still a routing/handover token, not the audit log:
   this carries current field VALUES only, never session_events history. */
function qrSnapshotOf(s){
  return {
    status:s.status, version:s.version, time:s.time, path:s.path, dir:s.dir,
    intake:s.intake, distance:s.distance, near:s.near, wheel:s.wheel,
    paddle:s.paddle, dispense:s.dispense, exit:s.exit,
  };
}
function simulateScan(id){ closeScrim(); handleScannedPayload(qrPayloadFor(state.sessions[id])); }
function simulateScanRaw(raw){ closeScrim(); handleScannedPayload(raw); }
/* every scan — camera, image upload, or the demo picker — passes through
   here: schema validation, then festival check, then the central station gate */
function handleScannedPayload(raw){
  let p=null;
  try{ p=JSON.parse(raw); }catch(e){ /* not JSON — treated as damaged below */ }
  if(!p || p.v!==1 || !p.cid || !acceptableId(p.cid)){
    showQRError('That QR code is damaged or is not an OOXii client code. Nothing was opened.');
    return;
  }
  const ctx = window.OOXII_BACKEND ? window.OOXII_BACKEND.getCachedContext() : null;
  if(ctx && p.fid && p.fid!==ctx.activeFestivalId){
    showQRError('This QR code is from a different festival. Nothing was opened.');
    return;
  }
  const existing=state.sessions[p.cid];
  if(!existing){
    // This device has never seen this client — the normal case for a real
    // offline handover between two devices with no server sync between
    // them. Adopt the snapshot carried in the QR rather than erroring out.
    if(!p.snap){ showQRError('Client '+p.cid+' is not on this device yet, and this QR code has no session data to import. Ask the previous station to show the QR again.'); return; }
    const adopted=Object.assign({id:p.cid}, p.snap);
    state.sessions[p.cid]=adopted;
    if(!state.queue.includes(p.cid)) state.queue.unshift(p.cid);
    if(window.OOXII_DB) window.OOXII_DB.sessions.put(adopted).catch(()=>{});
    openSessionForActiveStation(adopted);
    return;
  }
  // Already have a local copy — never let an older QR snapshot silently
  // overwrite newer local data (same "local wins if newer" rule Search
  // Client already uses for the online/offline merge).
  if(p.snap && p.ver && p.ver > (existing.version||0)){
    const merged=Object.assign({}, existing, p.snap, {id:p.cid});
    state.sessions[p.cid]=merged;
    if(window.OOXII_DB) window.OOXII_DB.sessions.put(merged).catch(()=>{});
    openSessionForActiveStation(merged);
    return;
  }
  openSessionForActiveStation(existing);
}

/* segmented control wiring */
function wireSeg(id,cb){
  const seg=$('#'+id); if(!seg)return;
  seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    if(cb)cb(b.dataset.v);
  });
}
function segVal(id){const on=$('#'+id+' .on');return on?on.dataset.v:null;}

/* stepper (Distance / Wheel / Paddle / Dispense)
   Strictly position-based: a step can NEVER show complete ahead of the current step.
   Only steps before `current` get a check; `current` shows its icon; later steps are locked. */
function stepper(current, s){
  const icons={Distance:'glasses',Wheel:'wheel',Paddle:'paddle',Dispense:'glasses'};
  const idx = STEPPER.indexOf(current);
  let html='<div class="stepper">';
  html += `<div class="stepline ${idx>=1?'':'muted'}" style="left:14%;width:24%"></div>`;
  html += `<div class="stepline ${idx>=2?'':'muted'}" style="left:38.5%;width:24%"></div>`;
  html += `<div class="stepline ${idx>=3?'':'muted'}" style="left:63%;width:24%"></div>`;
  STEPPER.forEach((st,i)=>{
    let cls='step', inner;
    if(i < idx){ cls+=' done';    inner=I('check',26); }
    else if(i===idx){ cls+=' current'; inner=I(icons[st],24,'#fff'); }
    else { cls+=' locked'; inner=I(icons[st],24,'#7c83b4'); }
    html+=`<div class="${cls}"><div class="circ">${inner}</div><div class="lbl">${st}</div></div>`;
  });
  return html+'</div>';
}

/* ===== Honey Rewards: earning & reward moments =====
   Honey counts workflow-task completions (registration saved, station test saved,
   dispensing task done, exit counselling done) — participation only, never outcomes. */
function awardHoney(){
  const h=state.honey, prev=dailyBadge(h.today);
  h.today++; h.monthClients++; state.tester.clientsTotal++;
  if(!h.sessionDays.includes(h.day)) h.sessionDays.push(h.day); // festival session day counted on first task
  saveHoney();
  const badge=dailyBadge(h.today);
  return {badgeUp: !!badge && badge!==prev, badge};
}
/* subtle by design: a quiet toast per task; the one-time animated moment is
   reserved for daily badge upgrades so testing itself is never interrupted */
function honeyAfterSave(r,label,after){
  state.tester.lastHoney=label;
  toast('+1 🍯 '+label+' · '+state.honey.today+' today');
  if(r.badgeUp) showHoneyMilestone(r.badge, after);
  else if(after) after();
}
/* complete a station task: count honey, hand over, continue.
   Individual mode: same tester keeps the client — no device handover, so no QR stop. */
function finishStationTask(s,label,after){
  const r=awardHoney();
  const cont=()=>honeyAfterSave(r,label, after || (()=>afterStationSave(s)));
  if(isIndividualMode()) cont();
  else showHandoverQR(s.id, cont);
}

/* advance after a station save: generate QR, then route ONLY where the active
   station is permitted — otherwise hand over and return to the station dashboard */
function advance(s){
  s.time=nowTime();
  const next=DE.getNextRequiredStep(s);
  if(!s.path.includes(next)) s.path.push(next);
  if(!state.queue.includes(s.id)) state.queue.unshift(s.id);
  finishStationTask(s, s._stepLabel||'Station task complete');
}
function afterStationSave(s){
  if(canActiveTesterOpenSession(s)) routeToStep(s); // e.g. Near follows Distance at the same station
  else go(baseScreen());
}

/* horizontal honeycomb progress bar — one hexagon per milestone chunk of the day.
   The most recently earned cell gently fills (subtle, one-shot animation). */
function honeycombRow(filled,total,mini=false){
  const R=mini?10:12, W=R*Math.sqrt(3), gap=3;
  const svgW=Math.ceil(total*(W+gap))+4, svgH=Math.ceil(R*2)+4;
  const pts=(cx,cy,r)=>Array.from({length:6},(_,i)=>{const a=(60*i-30)*Math.PI/180;return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(' ');
  let cells='';
  for(let i=0;i<total;i++){
    const cx=i*(W+gap)+W/2+2, cy=svgH/2;
    const f=i<filled, isNew=f&&i===filled-1;
    cells+=`<polygon points="${pts(cx,cy,R-1)}" ${isNew?'class="comb-new"':''}
      fill="${f?'url(#combg)':'rgba(255,255,255,0.05)'}"
      stroke="${f?'#c8860a':'rgba(255,255,255,0.18)'}" stroke-width="1.2"/>`;
  }
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;margin:0 auto" aria-hidden="true">
    <defs><radialGradient id="combg" cx="35%" cy="30%"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#d97706"/></radialGradient></defs>${cells}</svg>`;
}

/* ============================ HONEYCOMB SVG ============================ */
function honeycombSVG(filled,mini=false){
  const R=mini?13:19;
  const W=R*Math.sqrt(3), H=R*2;
  const cells=[];
  for(let row=0;row<4;row++){
    const even=row%2===0, cols=even?5:4, ox=even?0:W/2;
    for(let col=0;col<cols;col++) cells.push({cx:ox+col*W+W/2+5,cy:row*(H*.75)+R+5});
  }
  const svgW=Math.ceil(5*W+10), svgH=Math.ceil(3*(H*.75)+H+10);
  const gid=mini?'hgm':'hgf';
  const pts=(cx,cy,r)=>Array.from({length:6},(_,i)=>{const a=(60*i-30)*Math.PI/180;return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(' ');
  const hexes=cells.map(({cx,cy},i)=>{
    const f=i<filled;
    return `<polygon points="${pts(cx,cy,R-1.5)}" fill="${f?`url(#${gid})`:'rgba(255,255,255,0.05)'}" stroke="${f?'#c8860a':'rgba(255,255,255,0.12)'}" stroke-width="1.2"/>`;
  }).join('');
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;margin:0 auto"><defs><radialGradient id="${gid}" cx="35%" cy="30%"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#d97706"/></radialGradient></defs>${hexes}</svg>`;
}

/* ============================ boot ============================ */
/* seed() above already gave `state` a synchronous, always-valid demo baseline
   so every function that reads state.sessions/state.queue at parse time is
   safe. If IndexedDB has real persisted sessions (or the app is truly
   configured for a real backend), this async step swaps them in and the
   demo seed is dropped — see js/session-repository.js demoSeedAllowed(). */
/* Sessions persist across refresh/restart via this hydration step; signing
   in (online or offline-PIN) is still required every fresh load — session
   VALIDITY should be re-checked, not silently trusted, in a clinical app. */
(async function boot(){
  try{
    if(window.OOXII_DB){
      const result = await window.OOXII_BACKEND.boot();
      if(!result.useDemoSeed){
        state.sessions = result.hydratedSessions;
        state.queue = result.hydratedQueue;
      }
    }
  }catch(e){ console.error('[OOXii] boot hydration failed, continuing with local demo data', e); }
  go(ScreenSignIn);
})();
</script>
