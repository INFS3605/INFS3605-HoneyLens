<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>OOXii Insights Portal</title>

<!--
  admin/index.html — OOXii Insights Portal (coordinator-only analytics).

  Completely separate from the tester app: does not load indexed-db.js,
  auth-service.js, session-repository.js, sync-service.js, qr-service.js,
  or backend-adapter.js — none of the tester app's offline/QR/sync logic
  runs on this page at all. Only reuses config.js and supabase-client.js
  (the one place the Supabase client is created), read-only, via the new
  coordinator RLS policies in supabase/migrations/006_insights_portal_read_access.sql.

  Single-file, no build step — same philosophy as the main app's
  index.html, kept as its own file so nothing here can ever touch the
  tester workflow.
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/config.example.js"></script>
<script src="../js/config.js" onerror="console.warn('[OOXii Admin] js/config.js not found — copy js/config.example.js and fill in your Supabase project values.')"></script>
<script src="../js/supabase-client.js"></script>

<style>
  :root{
    --bg-0:#0c0e24; --bg-1:#12153a; --bg-2:#171a47;
    --surface:rgba(118,128,205,.10); --surface-2:rgba(120,131,210,.16);
    --border:rgba(154,164,228,.14); --border-2:rgba(154,164,228,.24);
    --teal:#14a8c5; --teal-2:#1cc3d6; --teal-deep:#0e83a0;
    --text:#ffffff; --dim:#a7add9; --dimmer:#7c83b4;
    --green:#4ade80; --green-bg:rgba(74,222,128,.12);
    --blue:#4d8bf5; --amber:#f5b945; --amber-bg:rgba(245,185,69,.12);
    --red:#f06a7a; --red-bg:rgba(240,106,122,.12);
    --paddle:#7d56c9;
    --r:14px;
    font-synthesis:none;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg-0); color:var(--text);
  }
  a{color:inherit}
  ::selection{background:var(--teal-2);color:#04202a}

  /* ---------- sign-in / gate screens ---------- */
  .gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-card{width:min(420px,100%);background:var(--bg-1);border:1px solid var(--border);border-radius:20px;padding:34px 30px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .gate-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;margin-bottom:22px}
  .gate-logo .dot{width:9px;height:9px;border-radius:50%;background:var(--teal-2)}
  .gate-h1{font-size:20px;font-weight:800;margin:0 0 6px}
  .gate-p{color:var(--dim);font-size:14px;margin:0 0 24px;line-height:1.5}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--dim);margin-bottom:6px;font-weight:600}
  .field input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border-2);background:var(--bg-0);color:var(--text);font-size:14px}
  .field input:focus{outline:2px solid var(--teal-2);outline-offset:1px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer;width:100%}
  .btn-primary{background:linear-gradient(135deg,var(--teal-2),var(--teal-deep));color:#04202a}
  .btn-primary:disabled{opacity:.6;cursor:default}
  .btn-ghost{background:transparent;border:1px solid var(--border-2);color:var(--text)}
  .gate-err{background:var(--red-bg);border:1px solid rgba(240,106,122,.35);color:#ffd7db;padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
  .gate-note{font-size:12px;color:var(--dimmer);margin-top:16px;line-height:1.5}

  /* ---------- app shell ---------- */
  #app{display:none}
  .topnav{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:6px;padding:0 22px;height:60px;background:rgba(12,14,36,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .topnav .logo{font-weight:800;font-size:17px;margin-right:18px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .topnav .logo .dot{width:8px;height:8px;border-radius:50%;background:var(--teal-2)}
  .topnav nav{display:flex;gap:2px;flex:1;overflow-x:auto}
  .topnav nav button{background:none;border:none;color:var(--dim);font-size:13.5px;font-weight:600;padding:9px 13px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .topnav nav button:hover{color:var(--text);background:var(--surface)}
  .topnav nav button.active{color:var(--text);background:var(--surface-2)}
  .topnav .userbox{display:flex;align-items:center;gap:10px;padding-left:14px;margin-left:8px;border-left:1px solid var(--border)}
  .topnav .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--teal-2),var(--paddle));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
  .topnav .who{font-size:12.5px;line-height:1.3}
  .topnav .who b{display:block;font-size:13px}
  .topnav .signout{background:none;border:1px solid var(--border-2);color:var(--dim);font-size:12px;border-radius:8px;padding:6px 10px;cursor:pointer;white-space:nowrap}

  main{max-width:1360px;margin:0 auto;padding:26px 22px 60px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .page-head h1{font-size:23px;margin:0 0 4px}
  .page-head p{margin:0;color:var(--dim);font-size:13.5px}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:26px}
  .kpi-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);padding:16px 17px}
  .kpi-card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .kpi-card .ic{width:32px;height:32px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center}
  .kpi-card .n{font-size:26px;font-weight:800;line-height:1.1}
  .kpi-card .lbl{color:var(--dim);font-size:12.5px;margin-top:4px}
  .kpi-card .delta{font-size:11.5px;margin-top:8px;font-weight:700;display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:100px}
  .delta.up{color:var(--green);background:var(--green-bg)}
  .delta.down{color:var(--red);background:var(--red-bg)}
  .delta.flat{color:var(--dim);background:var(--surface)}
  .kpi-card .na{font-size:11px;color:var(--dimmer);margin-top:8px;font-style:italic}

  .grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
  @media (max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

  .card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);padding:18px 19px}
  .card h3{margin:0 0 3px;font-size:14.5px}
  .card .sub{color:var(--dimmer);font-size:12px;margin:0 0 14px}
  .card .empty{color:var(--dimmer);font-size:13px;text-align:center;padding:30px 10px}

  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:100px}
  .chip.green{color:var(--green);background:var(--green-bg)}
  .chip.amber{color:var(--amber);background:var(--amber-bg)}
  .chip.red{color:var(--red);background:var(--red-bg)}
  .chip.dim{color:var(--dim);background:var(--surface)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--dimmer);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;padding:0 10px 10px;border-bottom:1px solid var(--border)}
  td{padding:11px 10px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  .clickable-row{cursor:pointer}
  .clickable-row:hover td{background:var(--surface)}

  .placeholder-page{padding:60px 20px;text-align:center;color:var(--dim)}
  .placeholder-page .ic{width:56px;height:56px;border-radius:16px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .placeholder-page h2{color:var(--text);margin:0 0 8px}
  .placeholder-page p{max-width:440px;margin:0 auto;font-size:13.5px;line-height:1.6}

  .loading{padding:60px;text-align:center;color:var(--dim);font-size:14px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg-2);border:1px solid var(--border-2);padding:11px 18px;border-radius:11px;font-size:13px;box-shadow:0 12px 30px rgba(0,0,0,.4);z-index:100}
</style>
</head>
<body>

  <div id="gate" class="gate-wrap">
    <div class="gate-card">
      <div class="gate-logo"><span class="dot"></span>OOXii Insights</div>
      <div id="gate-body"></div>
    </div>
  </div>

  <div id="app">
    <div class="topnav">
      <div class="logo"><span class="dot"></span>OOXii Insights</div>
      <nav id="topnav-links"></nav>
      <div class="userbox">
        <div class="avatar" id="nav-avatar">?</div>
        <div class="who"><b id="nav-name">—</b><span id="nav-role">—</span></div>
      </div>
      <button class="signout" onclick="AdminApp.signOut()">Sign out</button>
    </div>
    <main id="main"></main>
  </div>

  <script src="js/admin-auth.js"></script>
  <script src="js/admin-charts.js"></script>
  <script src="js/admin-data.js"></script>
  <script src="js/admin-app.js"></script>
</body>
</html>
